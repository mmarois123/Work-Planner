<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens (Light) ── */
    :root {
      --bg:            #faf8f3;
      --bg-alt:        #f3f0e8;
      --nav-bg:        #1c1812;
      --nav-border:    transparent;
      --nav-logo:      #8a7258;
      --nav-tab-idle:  #6b5f4e;
      --nav-tab-hover: #c8b99a;
      --nav-tab-active:#f0ece2;
      --nav-tab-active-border: #f0ece2;
      --text:          #1c1812;
      --text-sub:      #6a5c48;
      --text-muted:    #9c8b72;
      --text-muted-dim:#bfb098;
      --greet-border:  #2a2218;
      --section-label: #9c8b72;
      --rule-maj:      #cfc8b8;
      --rule-min:      #e8e2d5;
      --task-hover:    rgba(0,0,0,0.04);
      --task-border:   #eae4d8;
      --cb-border:     #9c8b72;
      --cb-checked:    #1c1812;
      --area-header-color:  #1c1812;
      --area-header-border: #1c1812;
      --note-color:    #b0a090;
      --badge-p1-bg:     #fde8e4; --badge-p1-text: #c0392b; --badge-p1-border: #f5b8b0;
      --badge-p2-bg:     #fef3d0; --badge-p2-text: #7d5a00; --badge-p2-border: #e8ca70;
      --badge-p3-bg:     #f0ece2; --badge-p3-text: #6a5c48; --badge-p3-border: #cfc8b8;
      --badge-del-bg:    #e4eef8; --badge-del-text: #1a4a7a; --badge-del-border: #a8c8ea;
      --badge-overdue-bg:  #fde8e4; --badge-overdue-text: #c0392b; --badge-overdue-border: #f5b8b0;
      --tag-sunbelt-bg:  #dbeafe; --tag-sunbelt-text: #1e40af;
      --tag-app-bg:      #d1fae5; --tag-app-text:     #047857;
      --tag-mkt-bg:      #fce7f3; --tag-mkt-text:     #be185d;
      --due-muted:     #a09080;
      --due-over:      #c0392b;
      --hl-btn:        rgba(0,0,0,0.15);
      --hl-btn-on:     #c0392b;
      --hl-btn-on-bg:  #fde8e4;
      --saving-bg:     #1c1812;
      --saving-text:   #f0ece2;
      --accent-today:  #c0392b;
      --search-bg:     #fff;
      --search-border: #cfc8b8;
      --search-border-focus: #9c8b72;
      --notes-tab-idle: #7c9fcf;
      --notes-tab-hover: #a8c4e8;
      --notes-tab-active-border: #7c9fcf;
    }

    :root.dark {
      --bg:            #181310;
      --bg-alt:        #211c15;
      --nav-bg:        #0d0b08;
      --nav-border:    #2e2418;
      --nav-logo:      #7a6448;
      --nav-tab-idle:  #5a4a35;
      --nav-tab-hover: #a08060;
      --nav-tab-active:#e0cca8;
      --nav-tab-active-border: #c8a870;
      --text:          #e0d0b8;
      --text-sub:      #a09070;
      --text-muted:    #7a6448;
      --text-muted-dim:#5a4a35;
      --greet-border:  #3a2e1e;
      --section-label: #7a6448;
      --rule-maj:      #2e2418;
      --rule-min:      #241e14;
      --task-hover:    rgba(255,255,255,0.04);
      --task-border:   #241e14;
      --cb-border:     #6a5438;
      --cb-checked:    #c8a870;
      --area-header-color:  #c8a870;
      --area-header-border: #3a2e1e;
      --note-color:    #5a4a35;
      --badge-p1-bg:     #3a1508; --badge-p1-text: #e8806a; --badge-p1-border: #6a2810;
      --badge-p2-bg:     #281e04; --badge-p2-text: #c8a040; --badge-p2-border: #4e3a08;
      --badge-p3-bg:     #1e1a10; --badge-p3-text: #8a7858; --badge-p3-border: #3a3020;
      --badge-del-bg:    #0c1e30; --badge-del-text: #6898c8; --badge-del-border: #1a3850;
      --badge-overdue-bg:  #3a1508; --badge-overdue-text: #e8806a; --badge-overdue-border: #6a2810;
      --tag-sunbelt-bg:  #0e1f38; --tag-sunbelt-text: #5a95d5;
      --tag-app-bg:      #0e2818; --tag-app-text:     #4ab870;
      --tag-mkt-bg:      #2a0e1e; --tag-mkt-text:     #c85898;
      --due-muted:     #6a5438;
      --due-over:      #e8806a;
      --hl-btn:        rgba(255,255,255,0.12);
      --hl-btn-on:     #e8806a;
      --hl-btn-on-bg:  #3a1508;
      --saving-bg:     #e0cca8;
      --saving-text:   #181310;
      --accent-today:  #e8806a;
      --search-bg:     #211c15;
      --search-border: #2e2418;
      --search-border-focus: #6a5438;
      --notes-tab-idle: #6898c8;
      --notes-tab-hover: #8ab0d8;
      --notes-tab-active-border: #6898c8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Nav ── */
    nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 44px;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.25s;
    }
    nav .logo {
      color: var(--nav-logo);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 24px;
      white-space: nowrap;
    }
    nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--nav-tab-idle);
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 13px 13px 11px;
      transition: color 0.15s;
      white-space: nowrap;
    }
    nav button:hover { color: var(--nav-tab-hover); }
    nav button.active { color: var(--nav-tab-active); border-bottom-color: var(--nav-tab-active-border); }
    nav button.today-tab { color: var(--accent-today); }
    nav button.today-tab:hover { color: var(--accent-today); }
    nav button.today-tab.active { color: var(--accent-today); border-bottom-color: var(--accent-today); }

    /* Nav anchors */
    nav .nav-anchor {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--nav-tab-idle);
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 13px 11px 11px;
      transition: color 0.15s;
      opacity: 0.7;
    }
    nav .nav-anchor:hover { color: var(--nav-tab-hover); opacity: 1; }
    nav .nav-sep { color: #333; font-size: 11px; padding: 0 6px; user-select: none; line-height: 42px; opacity: 0.5; }

    /* Notes tab */
    nav button.notes-tab { color: var(--notes-tab-idle); }
    nav button.notes-tab:hover { color: var(--notes-tab-hover); }
    nav button.notes-tab.active { color: var(--notes-tab-hover); border-bottom-color: var(--notes-tab-active-border); }

    /* Dark mode toggle */
    .dark-toggle {
      margin-left: auto;
      background: none;
      border: 1px solid var(--nav-tab-idle) !important;
      border-radius: 12px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      color: var(--nav-tab-idle);
      padding: 3px 10px !important;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .dark-toggle:hover { color: var(--nav-tab-hover) !important; border-color: var(--nav-tab-hover) !important; }

    /* ── Main ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    /* ── Section ── */
    .section { margin-bottom: 26px; }

    .section-heading {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--section-label);
      padding-bottom: 5px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--rule-maj);
    }

    .subsection-heading {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted-dim);
      margin: 12px 0 4px 0;
    }

    /* ── Task row ── */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 4px 6px;
      border-radius: 4px;
      border-bottom: 1px solid var(--task-border);
      transition: background 0.12s, transform 0.12s;
      cursor: default;
    }
    .task:last-child { border-bottom: none; }
    .task:hover { background: var(--task-hover); transform: translateX(2px); }
    .task.completed .task-text { text-decoration: line-through; color: var(--text-muted-dim); }
    .task.completed { opacity: 0.55; }

    /* Left: chevron + checkbox */
    .task-left {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      padding-top: 3px;
    }
    .chevron {
      background: none;
      border: none;
      color: var(--text-muted-dim);
      cursor: pointer;
      font-size: 8px;
      padding: 0;
      width: 12px;
      text-align: center;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .chevron:hover { color: var(--text-muted); }
    .chevron.hidden { visibility: hidden; pointer-events: none; }

    /* Custom checkbox */
    input[type="checkbox"] {
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--cb-border);
      border-radius: 2px;
      flex-shrink: 0;
      cursor: pointer;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
      transition: background 0.15s, border-color 0.15s;
    }
    input[type="checkbox"]:checked {
      background: var(--cb-checked);
      border-color: var(--cb-checked);
    }

    /* Body: text + meta */
    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 3px;
      align-items: center;
    }
    .badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
    }
    .badge-p1 { background: var(--badge-p1-bg); color: var(--badge-p1-text); border-color: var(--badge-p1-border); }
    .badge-p2 { background: var(--badge-p2-bg); color: var(--badge-p2-text); border-color: var(--badge-p2-border); }
    .badge-p3 { background: var(--badge-p3-bg); color: var(--badge-p3-text); border-color: var(--badge-p3-border); }
    .badge-delegated { background: var(--badge-del-bg); color: var(--badge-del-text); border-color: var(--badge-del-border); font-size: 9px; padding: 1px 5px; border-radius: 2px; font-weight: 600; }
    .due {
      font-size: 11px;
      color: var(--due-muted);
    }
    .due.overdue { color: var(--due-over); font-weight: 600; }

    /* Area tag (Today view only) */
    .task-area-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
      margin-right: 6px;
      letter-spacing: 0.07em;
      vertical-align: 2px;
    }
    .task-area-tag.sunbelt { background: var(--tag-sunbelt-bg); color: var(--tag-sunbelt-text); }
    .task-area-tag.app { background: var(--tag-app-bg); color: var(--tag-app-text); }
    .task-area-tag.marketing { background: var(--tag-mkt-bg); color: var(--tag-mkt-text); }
    .task-area-tag.personal { background: var(--badge-p3-bg); color: var(--badge-p3-text); }

    /* Right: highlight button */
    .task-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding-top: 3px;
    }
    .btn-hl {
      background: none;
      border: 1px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      color: var(--hl-btn);
      padding: 2px 4px;
      transition: color 0.12s, background 0.12s;
    }
    .btn-hl:hover { color: var(--hl-btn-on); }
    .btn-hl.on { color: var(--hl-btn-on); background: var(--hl-btn-on-bg); border-color: var(--hl-btn-on); }

    /* Subtasks */
    .subtasks { margin-left: 26px; }
    .subtasks.hidden { display: none; }

    /* Non-checkbox notes */
    .note {
      font-size: 11px;
      color: var(--note-color);
      margin-left: 26px;
      padding: 2px 0;
      line-height: 1.4;
    }

    /* ── Today view ── */
    .today-greeting {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 28px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--greet-border);
    }
    .today-greeting .greeting-date {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
    }
    .today-block { margin-bottom: 24px; }
    .today-block-overdue .section-heading { color: var(--accent-today); border-bottom-color: var(--badge-p1-border); }
    .today-block-priorities .section-heading { color: var(--text-sub); border-bottom-color: var(--badge-p2-border); }
    .today-block-completed .section-heading { color: var(--tag-app-text); border-bottom-color: var(--tag-app-bg); }
    .today-block-delegated .section-heading { color: var(--badge-del-text); border-bottom-color: var(--badge-del-border); }
    .area-header {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--area-header-color);
      margin: 28px 0 6px 0;
      padding: 6px 0 5px 0;
      border-bottom: 1.5px solid var(--area-header-border);
    }

    /* Loading / error */
    .status { color: var(--text-muted); padding: 40px 0; text-align: center; font-size: 13px; }

    /* Saving indicator */
    #saving {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--saving-bg);
      color: var(--saving-text);
      font-size: 10px;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #saving.visible { opacity: 1; }

    /* ── Notes view ── */
    .notes-search-wrap { margin-bottom: 24px; }
    .notes-search-input {
      width: 100%;
      max-width: 420px;
      padding: 8px 12px;
      border: 1px solid var(--search-border);
      border-radius: 6px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      background: var(--search-bg);
      color: var(--text);
      transition: border-color 0.15s;
    }
    .notes-search-input:focus { border-color: var(--search-border-focus); }
    .note-area-block { margin-bottom: 32px; }
    .note-area-block-header {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--area-header-color);
      margin: 0 0 12px 0;
      padding: 6px 0 5px 0;
      border-bottom: 1.5px solid var(--area-header-border);
    }
    .note-section-el { margin-bottom: 18px; }
    .note-sec-heading {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--section-label);
      padding-bottom: 5px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--rule-maj);
    }
    .note-subsec-heading {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted-dim);
      margin: 14px 0 6px 0;
    }
    .note-para { font-size: 13px; color: var(--text-sub); margin: 5px 0; line-height: 1.6; }
    .note-ul { margin: 5px 0 5px 18px; padding: 0; }
    .note-ul li { font-size: 13px; color: var(--text-sub); line-height: 1.6; margin: 2px 0; }
    .note-ul li strong { color: var(--text); }
    .note-code { font-family: 'Menlo', 'Consolas', monospace; background: var(--bg-alt); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .notes-no-results { color: var(--text-muted); font-style: italic; font-size: 13px; padding: 24px 0; text-align: center; }
  </style>
</head>
<body>

<nav>
  <span class="logo">Work Planner</span>
  <div id="tabs"></div>
  <button class="dark-toggle" id="dark-toggle" onclick="toggleDarkMode()"></button>
</nav>

<main id="content">
  <div class="status">Loading...</div>
</main>

<div id="saving">Saving&hellip;</div>

<script>
const AREA_LABELS = { sunbelt: 'Sunbelt', app: 'App', marketing: 'Marketing', personal: 'Personal' };
const TODAY_AREAS = ['sunbelt', 'app', 'marketing'];

let areas = {};
let areaStates = {};
let currentView = null;

// ── Dark mode ─────────────────────────────────────────────────────────────────

function initDarkMode() {
  const saved = localStorage.getItem('wp-dark-mode');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved !== null ? saved === 'true' : prefersDark;
  applyDarkMode(dark);
}

function applyDarkMode(dark) {
  document.documentElement.classList.toggle('dark', dark);
  const btn = document.getElementById('dark-toggle');
  if (btn) btn.textContent = dark ? '\u2600 Light' : '\u263E Dark';
}

function toggleDarkMode() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('wp-dark-mode', isDark);
  const btn = document.getElementById('dark-toggle');
  if (btn) btn.textContent = isDark ? '\u2600 Light' : '\u263E Dark';
}

initDarkMode();

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('/api/areas');
    const list = await res.json();
    areas = {};
    for (const a of list) areas[a.key] = a;
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="status">Could not connect to server. Is server.py running?</div>';
    return;
  }
  buildTabs();
  window.addEventListener('hashchange', applyHash);

  const hash = location.hash;
  if (hash === '#notes') { switchToNotes(); return; }
  if (hash.startsWith('#today/')) {
    const scrollTo = hash.slice('#today/'.length);
    switchToToday(TODAY_AREAS.includes(scrollTo) ? scrollTo : null);
    return;
  }
  if (hash === '#today') { switchToToday(null); return; }
  switchToToday(null);
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';

  const todayBtn = document.createElement('button');
  todayBtn.textContent = 'Today';
  todayBtn.className = 'today-tab';
  todayBtn.dataset.view = 'today';
  todayBtn.onclick = () => {
    if (currentView === 'today') {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      switchToToday(null);
    }
  };
  tabs.appendChild(todayBtn);

  for (const key of TODAY_AREAS) {
    const btn = document.createElement('button');
    btn.textContent = AREA_LABELS[key] || key;
    btn.className = 'nav-anchor';
    btn.dataset.anchor = key;
    btn.onclick = () => navigateToArea(key);
    tabs.appendChild(btn);
  }

  const sep = document.createElement('span');
  sep.className = 'nav-sep';
  sep.textContent = '|';
  tabs.appendChild(sep);

  const notesBtn = document.createElement('button');
  notesBtn.textContent = 'Notes';
  notesBtn.className = 'notes-tab';
  notesBtn.dataset.view = 'notes';
  notesBtn.onclick = () => switchToNotes();
  tabs.appendChild(notesBtn);
}

function setActiveTab(view) {
  document.querySelectorAll('#tabs button[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
}

function applyHash() {
  const hash = location.hash;
  if (hash === '#notes') {
    if (currentView !== 'notes') switchToNotes();
  } else if (hash.startsWith('#today/')) {
    const scrollTo = hash.slice('#today/'.length);
    if (currentView !== 'today') {
      switchToToday(scrollTo);
    } else {
      const el = document.getElementById(`area-section-${scrollTo}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  } else if (hash === '#today') {
    if (currentView !== 'today') switchToToday(null);
  }
}

// ── Data fetching ────────────────────────────────────────────────────────────

async function fetchArea(area) {
  const res = await fetch(`/api/tasks/${area}`);
  const text = await res.text();
  areaStates[area] = { rawLines: text.split('\n').map(l => l.replace(/\r$/, '')) };
}

async function switchArea(area) {
  currentView = area;
  setActiveTab(area);
  document.getElementById('content').innerHTML = '<div class="status">Loading...</div>';
  if (location.hash) history.replaceState(null, '', location.pathname + location.search);
  try {
    await fetchArea(area);
    renderArea(area);
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Failed to load tasks.</div>';
  }
}

async function switchToToday(scrollTo) {
  currentView = 'today';
  setActiveTab('today');
  document.getElementById('content').innerHTML = '<div class="status">Loading...</div>';
  const newHash = scrollTo ? `#today/${scrollTo}` : '#today';
  if (location.hash !== newHash) history.replaceState(null, '', location.pathname + location.search + newHash);
  try {
    await Promise.all(TODAY_AREAS.map(fetchArea));
    renderToday();
    if (scrollTo) {
      setTimeout(() => {
        const el = document.getElementById(`area-section-${scrollTo}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Failed to load tasks.</div>';
  }
}

async function navigateToArea(area) {
  if (currentView !== 'today') {
    await switchToToday(area);
  } else {
    const el = document.getElementById(`area-section-${area}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── Markdown parsing ─────────────────────────────────────────────────────────

function parseLine(line) {
  const taskMatch = line.match(/^(\s*)- \[([ x])\] (.*)$/);
  if (taskMatch) {
    const indent = taskMatch[1].length;
    const checked = taskMatch[2] === 'x';
    let rest = taskMatch[3];

    const highlighted = rest.startsWith('\u{1F7E0} ');
    if (highlighted) rest = rest.slice('\u{1F7E0} '.length);

    const priMatch = rest.match(/\[(P[123])\]/);
    const priority = priMatch ? priMatch[1] : null;
    if (priMatch) rest = rest.replace(/\s*\[P[123]\]\s*/, ' ').trim();

    const dueMatch = rest.match(/\(due:\s*(\d{4}-\d{2}-\d{2})\)/);
    const due = dueMatch ? dueMatch[1] : null;
    if (dueMatch) rest = rest.replace(/\s*\(due:\s*\d{4}-\d{2}-\d{2}\)\s*/, ' ').trim();

    const delMatch = rest.match(/@delegated\(([^)]+)\)/);
    const delegated = delMatch ? delMatch[1] : null;
    if (delMatch) rest = rest.replace(/\s*@delegated\([^)]+\)\s*/, ' ').trim();

    return { type: 'task', indent, checked, highlighted, priority, due, delegated, text: rest.trim() };
  }

  const headMatch = line.match(/^(#{1,3}) (.+)$/);
  if (headMatch) {
    return { type: 'section', level: headMatch[1].length, text: headMatch[2].trim() };
  }

  if (line.match(/^\s+- /)) {
    const text = line.replace(/^\s+- /, '').replace(/\\(.)/g, '$1');
    return { type: 'note', text };
  }

  return { type: 'blank' };
}

function isOverdue(due) {
  if (!due) return false;
  const today = new Date().toISOString().slice(0, 10);
  return due < today;
}

function formatDue(due) {
  const [y, m, d] = due.split('-');
  return `${+m}/${+d}/${y.slice(2)}`;
}

function parseArea(area) {
  const lines = areaStates[area].rawLines;
  const sections = [];
  let currentSection = null;
  let currentTask = null;

  lines.forEach((line, idx) => {
    const p = parseLine(line);
    if (p.type === 'section' && p.level === 2) {
      currentSection = { name: p.text, tasks: [] };
      sections.push(currentSection);
      currentTask = null;
      return;
    }
    if (p.type === 'task') {
      const obj = { ...p, lineIdx: idx, area, subtasks: [], notes: [] };
      if (p.indent === 0) {
        currentTask = obj;
        if (currentSection) currentSection.tasks.push(currentTask);
      } else if (currentTask) {
        currentTask.subtasks.push(obj);
      }
      return;
    }
    if (p.type === 'note' && currentTask) {
      currentTask.notes.push(p.text);
    }
  });

  return sections;
}

// ── Render: area view ────────────────────────────────────────────────────────

function renderArea(area) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const lines = areaStates[area].rawLines;

  let sectionEl = null;
  let topGroup = null;
  let topTaskEl = null;
  let subtasksEl = null;

  lines.forEach((line, idx) => {
    const p = parseLine(line);

    if (p.type === 'section') {
      if (p.level === 1) return;
      if (p.level === 2) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'section';
        const h = document.createElement('div');
        h.className = 'section-heading';
        h.textContent = p.text;
        sectionEl.appendChild(h);
        content.appendChild(sectionEl);
        topGroup = null; topTaskEl = null; subtasksEl = null;
      } else {
        const h = document.createElement('div');
        h.className = 'subsection-heading';
        h.textContent = p.text;
        (sectionEl || content).appendChild(h);
        topGroup = null; topTaskEl = null; subtasksEl = null;
      }
      return;
    }

    if (p.type === 'task') {
      const el = buildTaskEl(p, idx, area, false);
      if (p.indent === 0) {
        const group = document.createElement('div');
        group.appendChild(el);
        (sectionEl || content).appendChild(group);
        topGroup = group;
        topTaskEl = el;
        subtasksEl = null;
      } else {
        if (topGroup) {
          if (!subtasksEl) {
            subtasksEl = document.createElement('div');
            subtasksEl.className = 'subtasks hidden';
            topGroup.appendChild(subtasksEl);
            const thisSubtasks = subtasksEl;
            const chev = topTaskEl.querySelector('.chevron');
            if (chev) {
              chev.classList.remove('hidden');
              chev.textContent = '\u25B6';
              chev.onclick = () => {
                const nowHidden = thisSubtasks.classList.toggle('hidden');
                chev.textContent = nowHidden ? '\u25B6' : '\u25BC';
              };
            }
          }
          subtasksEl.appendChild(el);
        }
      }
      return;
    }

    if (p.type === 'note') {
      if (topGroup) {
        const note = document.createElement('div');
        note.className = 'note';
        note.textContent = p.text;
        (subtasksEl || topGroup).appendChild(note);
      }
      return;
    }
  });
}

// ── Render: Today view ──────────────────────────────────────────────────────

function renderToday() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const parsed = {};
  for (const a of TODAY_AREAS) parsed[a] = parseArea(a);

  // Greeting
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  const greeting = document.createElement('div');
  greeting.className = 'today-greeting';
  greeting.id = 'today-top';
  greeting.innerHTML = 'Good morning <span class="greeting-date">\u2014 ' + dateStr + '</span>';
  content.appendChild(greeting);

  // Flatten all top-level tasks across all areas
  const allTasks = [];
  for (const a of TODAY_AREAS) {
    for (const sec of parsed[a]) {
      for (const t of sec.tasks) allTasks.push(t);
    }
  }

  // Helper: build a titled block with a set of task groups
  function buildBlock(title, tasks, blockClass, showTags) {
    if (!tasks.length) return null;
    const block = document.createElement('div');
    block.className = 'today-block' + (blockClass ? ' ' + blockClass : '');
    const h = document.createElement('div');
    h.className = 'section-heading';
    h.textContent = title;
    block.appendChild(h);
    for (const t of tasks) block.appendChild(buildTaskGroup(t, showTags));
    return block;
  }

  // Overdue
  const overdue = allTasks.filter(t => !t.checked && isOverdue(t.due));
  const overdueBlock = buildBlock(`\u26A0 Overdue \u00B7 ${overdue.length}`, overdue, 'today-block-overdue', true);
  if (overdueBlock) content.appendChild(overdueBlock);

  // Priorities
  const priorities = allTasks.filter(t =>
    !t.checked && (t.priority === 'P1' || t.highlighted)
  );
  priorities.sort((a, b) => {
    if (a.priority === 'P1' && b.priority !== 'P1') return -1;
    if (b.priority === 'P1' && a.priority !== 'P1') return 1;
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return 0;
  });
  const prioritiesBlock = buildBlock(`\u2605 Priorities \u00B7 ${priorities.length}`, priorities, 'today-block-priorities', true);
  if (prioritiesBlock) content.appendChild(prioritiesBlock);

  // Open by area
  for (const a of TODAY_AREAS) {
    const openInArea = [];
    for (const sec of parsed[a]) openInArea.push(...sec.tasks.filter(t => !t.checked));
    if (!openInArea.length) continue;

    const areaHeader = document.createElement('div');
    areaHeader.className = 'area-header';
    areaHeader.id = `area-section-${a}`;
    areaHeader.innerHTML = `${AREA_LABELS[a]} <span style="font-size:11px;font-weight:400;color:var(--text-muted)">${openInArea.length} open</span>`;
    content.appendChild(areaHeader);

    for (const sec of parsed[a]) {
      const openInSection = sec.tasks.filter(t => !t.checked);
      if (!openInSection.length) continue;
      const block = buildBlock(`${sec.name} \u00B7 ${openInSection.length}`, openInSection, null, false);
      if (block) content.appendChild(block);
    }
  }

  // Completed
  const completed = allTasks.filter(t => t.checked);
  const completedBlock = buildBlock(`Completed \u00B7 ${completed.length}`, completed, 'today-block-completed', true);
  if (completedBlock) content.appendChild(completedBlock);
}

// Build a task row + its subtasks (collapsible) and notes
function buildTaskGroup(task, showAreaTag) {
  const group = document.createElement('div');
  const el = buildTaskEl(task, task.lineIdx, task.area, showAreaTag);
  group.appendChild(el);

  const hasSubtasks = task.subtasks && task.subtasks.length > 0;

  if (hasSubtasks) {
    const subtasksEl = document.createElement('div');
    subtasksEl.className = 'subtasks hidden';
    group.appendChild(subtasksEl);

    const chev = el.querySelector('.chevron');
    if (chev) {
      chev.classList.remove('hidden');
      chev.textContent = '\u25B6';
      chev.onclick = () => {
        const nowHidden = subtasksEl.classList.toggle('hidden');
        chev.textContent = nowHidden ? '\u25B6' : '\u25BC';
      };
    }

    for (const sub of task.subtasks) {
      subtasksEl.appendChild(buildTaskEl(sub, sub.lineIdx, sub.area, false));
    }
    for (const note of task.notes) {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = note;
      subtasksEl.appendChild(n);
    }
  } else if (task.notes && task.notes.length) {
    for (const note of task.notes) {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = note;
      group.appendChild(n);
    }
  }

  return group;
}

// ── Task row builder ────────────────────────────────────────────────────────

function buildTaskEl(p, lineIdx, area, showAreaTag) {
  const wrap = document.createElement('div');
  wrap.className = 'task' + (p.checked ? ' completed' : '');
  wrap.dataset.area = area;
  wrap.dataset.lineIdx = lineIdx;

  // Left: chevron + checkbox
  const left = document.createElement('div');
  left.className = 'task-left';

  const chev = document.createElement('button');
  chev.className = 'chevron hidden';
  chev.textContent = '\u25B6';
  left.appendChild(chev);

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = p.checked;
  cb.onchange = () => toggleCheckbox(area, lineIdx);
  left.appendChild(cb);
  wrap.appendChild(left);

  // Body: text + meta
  const body = document.createElement('div');
  body.className = 'task-body';

  const textLine = document.createElement('div');
  textLine.className = 'task-text';

  if (showAreaTag) {
    const tag = document.createElement('span');
    tag.className = 'task-area-tag ' + area;
    tag.textContent = AREA_LABELS[area] || area;
    textLine.appendChild(tag);
  }

  const textSpan = document.createElement('span');
  textSpan.textContent = p.text;
  textLine.appendChild(textSpan);
  body.appendChild(textLine);

  if (p.priority || p.due || p.delegated) {
    const meta = document.createElement('div');
    meta.className = 'task-meta';
    if (p.priority) {
      const b = document.createElement('span');
      b.className = `badge badge-${p.priority.toLowerCase()}`;
      b.textContent = p.priority;
      meta.appendChild(b);
    }
    if (p.due) {
      const d = document.createElement('span');
      const overdue = isOverdue(p.due);
      d.className = 'due' + (overdue ? ' overdue' : '');
      d.textContent = (overdue ? '\u26A0 ' : '') + 'due ' + formatDue(p.due);
      meta.appendChild(d);
    }
    if (p.delegated) {
      const d = document.createElement('span');
      d.className = 'badge badge-delegated';
      d.textContent = '@' + p.delegated;
      meta.appendChild(d);
    }
    body.appendChild(meta);
  }

  wrap.appendChild(body);

  // Right: highlight button (star instead of orange circle)
  const right = document.createElement('div');
  right.className = 'task-right';
  const hl = document.createElement('button');
  hl.className = 'btn-hl' + (p.highlighted ? ' on' : '');
  hl.title = p.highlighted ? 'Remove highlight' : 'Highlight';
  hl.textContent = '\u2605';
  hl.onclick = () => toggleHighlight(area, lineIdx);
  right.appendChild(hl);
  wrap.appendChild(right);

  return wrap;
}

// ── Mutations ────────────────────────────────────────────────────────────────

function toggleCheckbox(area, lineIdx) {
  const rawLines = areaStates[area].rawLines;
  const line = rawLines[lineIdx];
  if (/^(\s*)- \[ \]/.test(line)) {
    rawLines[lineIdx] = line.replace(/^(\s*)- \[ \]/, '$1- [x]');
  } else {
    rawLines[lineIdx] = line.replace(/^(\s*)- \[x\]/, '$1- [ ]');
  }
  save(area);
}

function toggleHighlight(area, lineIdx) {
  const rawLines = areaStates[area].rawLines;
  const line = rawLines[lineIdx];
  const withHL = line.match(/^(\s*- \[[ x]\] )\u{1F7E0} (.*)$/u);
  if (withHL) {
    rawLines[lineIdx] = withHL[1] + withHL[2];
  } else {
    const without = line.match(/^(\s*- \[[ x]\] )(.*)$/);
    if (without) rawLines[lineIdx] = without[1] + '\u{1F7E0} ' + without[2];
  }
  save(area);
}

let saveTimer = null;
const saveQueue = new Set();

function save(area) {
  rerenderCurrent();
  saveQueue.add(area);
  const indicator = document.getElementById('saving');
  indicator.classList.add('visible');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const toSave = [...saveQueue];
    saveQueue.clear();
    try {
      await Promise.all(toSave.map(async a => {
        const body = areaStates[a].rawLines.join('\n');
        await fetch(`/api/tasks/${a}`, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain; charset=utf-8' },
          body,
        });
      }));
    } catch (e) {
      console.error('Save failed', e);
    }
    indicator.classList.remove('visible');
  }, 400);
}

// ── Notes view ───────────────────────────────────────────────────────────────

const NOTES_AREAS_ALL = ['sunbelt', 'app', 'marketing', 'personal'];
let notesData = {};

async function switchToNotes() {
  currentView = 'notes';
  setActiveTab('notes');
  document.getElementById('content').innerHTML = '<div class="status">Loading...</div>';
  if (location.hash !== '#notes') history.replaceState(null, '', location.pathname + location.search + '#notes');
  try {
    await Promise.all(NOTES_AREAS_ALL.map(async a => {
      const res = await fetch(`/api/notes/${a}`);
      notesData[a] = await res.text();
    }));
    renderNotes('');
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Failed to load notes.</div>';
  }
}

function renderNotes(query) {
  const content = document.getElementById('content');

  let searchInput = document.getElementById('notes-search');
  if (!searchInput) {
    content.innerHTML = '';
    const searchWrap = document.createElement('div');
    searchWrap.className = 'notes-search-wrap';
    searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.id = 'notes-search';
    searchInput.placeholder = 'Search notes\u2026';
    searchInput.className = 'notes-search-input';
    searchInput.addEventListener('input', () => renderNotes(searchInput.value));
    searchWrap.appendChild(searchInput);
    content.appendChild(searchWrap);

    const notesContainer = document.createElement('div');
    notesContainer.id = 'notes-content';
    content.appendChild(notesContainer);
  }

  searchInput.value = query;

  const notesContainer = document.getElementById('notes-content');
  notesContainer.innerHTML = '';

  const q = query.trim().toLowerCase();
  let totalMatches = 0;

  for (const a of NOTES_AREAS_ALL) {
    const text = notesData[a] || '';
    const sections = parseNoteFile(text);
    const matching = q
      ? sections.filter(s => (s.heading + '\n' + s.lines.join('\n')).toLowerCase().includes(q))
      : sections;
    if (!matching.length) continue;
    totalMatches += matching.length;

    const areaBlock = document.createElement('div');
    areaBlock.className = 'note-area-block';

    const areaHdr = document.createElement('div');
    areaHdr.className = 'note-area-block-header';
    areaHdr.textContent = AREA_LABELS[a] || a;
    areaBlock.appendChild(areaHdr);

    for (const sec of matching) areaBlock.appendChild(renderNoteSectionEl(sec));
    notesContainer.appendChild(areaBlock);
  }

  if (q && totalMatches === 0) {
    const empty = document.createElement('div');
    empty.className = 'notes-no-results';
    empty.textContent = `No notes match "${query}"`;
    notesContainer.appendChild(empty);
  }
}

function parseNoteFile(text) {
  const lines = text.split('\n');
  const sections = [];
  let current = null;

  for (const line of lines) {
    const t = line.trimEnd();
    if (t.startsWith('### ')) {
      if (current) sections.push(current);
      current = { level: 3, heading: t.slice(4).trim(), lines: [] };
    } else if (t.startsWith('## ')) {
      if (current) sections.push(current);
      current = { level: 2, heading: t.slice(3).trim(), lines: [] };
    } else if (t.startsWith('# ')) {
      // skip document title
    } else if (current) {
      current.lines.push(t);
    }
  }
  if (current) sections.push(current);

  for (const s of sections) {
    while (s.lines.length && !s.lines[s.lines.length - 1].trim()) s.lines.pop();
  }
  return sections.filter(s => s.lines.some(l => l.trim()));
}

function renderNoteSectionEl(sec) {
  const el = document.createElement('div');
  el.className = 'note-section-el';

  const hdr = document.createElement('div');
  hdr.className = sec.level === 2 ? 'note-sec-heading' : 'note-subsec-heading';
  hdr.textContent = sec.heading;
  el.appendChild(hdr);

  let ulEl = null;
  for (const line of sec.lines) {
    if (!line.trim()) { ulEl = null; continue; }
    if (/^(\s*)[-*] /.test(line)) {
      if (!ulEl) { ulEl = document.createElement('ul'); ulEl.className = 'note-ul'; el.appendChild(ulEl); }
      const li = document.createElement('li');
      li.innerHTML = renderInlineMarkdown(line.replace(/^(\s*)[-*] /, ''));
      ulEl.appendChild(li);
    } else {
      ulEl = null;
      const p = document.createElement('p');
      p.className = 'note-para';
      p.innerHTML = renderInlineMarkdown(line);
      el.appendChild(p);
    }
  }
  return el;
}

function renderInlineMarkdown(text) {
  const safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return safe
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<span class="note-code">$1</span>')
    .replace(/~~(.+?)~~/g, '<s>$1</s>');
}

function rerenderCurrent() {
  const scrollY = window.scrollY;
  if (currentView === 'today') {
    renderToday();
  } else if (currentView === 'notes') {
    // notes view handles its own scroll
  } else if (currentView) {
    renderArea(currentView);
  }
  window.scrollTo(0, scrollY);
}

// ── Go ───────────────────────────────────────────────────────────────────────
init();
</script>
