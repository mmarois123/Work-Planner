<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #efefef;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Nav ── */
    nav {
      background: #111;
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    nav .logo {
      color: #555;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-right: 24px;
      white-space: nowrap;
    }
    nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #777;
      cursor: pointer;
      font-size: 13px;
      padding: 13px 14px 11px;
      transition: color 0.15s;
    }
    nav button:hover { color: #ccc; }
    nav button.active { color: #fff; border-bottom-color: #fff; }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 28px auto;
      padding: 0 20px 60px;
    }

    /* ── Section ── */
    .section { margin-bottom: 28px; }

    .section-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
      padding-bottom: 6px;
      margin-bottom: 4px;
      border-bottom: 1px solid #d8d8d8;
    }

    .subsection-heading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin: 14px 0 4px 0;
    }

    /* ── Task row ── */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 5px;
      transition: background 0.1s;
    }
    .task:hover { background: rgba(0,0,0,0.05); }
    .task.completed .task-text { text-decoration: line-through; color: #aaa; }
    .task.completed { opacity: 0.6; }

    /* Left: chevron + checkbox */
    .task-left {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .chevron {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 9px;
      padding: 0;
      width: 14px;
      text-align: center;
      line-height: 1;
      flex-shrink: 0;
    }
    .chevron.hidden { visibility: hidden; pointer-events: none; }
    input[type="checkbox"] {
      cursor: pointer;
      width: 14px;
      height: 14px;
      accent-color: #333;
      flex-shrink: 0;
    }

    /* Body: text + meta */
    .task-body { flex: 1; min-width: 0; }
    .task-text { word-break: break-word; }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 3px;
      align-items: center;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .badge-p1 { background: #fde0e0; color: #b91c1c; }
    .badge-p2 { background: #fef3cd; color: #92400e; }
    .badge-p3 { background: #ebebeb; color: #666; }
    .badge-delegated { background: #dbeafe; color: #1d4ed8; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .due {
      font-size: 11px;
      color: #999;
    }
    .due.overdue { color: #b91c1c; font-weight: 600; }

    /* Right: highlight button */
    .task-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding-top: 1px;
    }
    .btn-hl {
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      opacity: 0.18;
      padding: 2px 4px;
      transition: opacity 0.12s, background 0.12s;
    }
    .btn-hl:hover { opacity: 0.55; }
    .btn-hl.on { opacity: 1; background: #fff7e0; border-color: #f0a030; }

    /* Subtasks */
    .subtasks { margin-left: 28px; }
    .subtasks.hidden { display: none; }

    /* Non-checkbox notes */
    .note {
      font-size: 12px;
      color: #aaa;
      margin-left: 28px;
      padding: 1px 0;
      line-height: 1.4;
    }

    /* Loading / error */
    .status { color: #999; padding: 40px 0; text-align: center; font-size: 13px; }

    /* Saving indicator */
    #saving {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #333;
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #saving.visible { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <span class="logo">Work Planner</span>
  <div id="tabs"></div>
</nav>

<main id="content">
  <div class="status">Loading...</div>
</main>

<div id="saving">Saving…</div>

<script>
const AREA_LABELS = { sunbelt: 'Sunbelt', app: 'App', marketing: 'Marketing', personal: 'Personal' };

let areas = {};
let currentArea = null;
let rawLines = [];

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('/api/areas');
    const list = await res.json(); // ordered array of {key, file, sections}
    areas = {};
    for (const a of list) areas[a.key] = a;
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="status">Could not connect to server. Is server.py running?</div>';
    return;
  }
  buildTabs();
  switchArea(Object.keys(areas)[0]);
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  for (const key of Object.keys(areas)) {
    const btn = document.createElement('button');
    btn.textContent = AREA_LABELS[key] || key;
    btn.dataset.area = key;
    btn.onclick = () => switchArea(key);
    tabs.appendChild(btn);
  }
}

async function switchArea(area) {
  currentArea = area;
  document.querySelectorAll('#tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.area === area)
  );
  document.getElementById('content').innerHTML = '<div class="status">Loading...</div>';
  try {
    const res = await fetch(`/api/tasks/${area}`);
    const text = await res.text();
    rawLines = text.split('\n').map(l => l.replace(/\r$/, ''));
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Failed to load tasks.</div>';
  }
}

// ── Markdown parsing ──────────────────────────────────────────────────────────

function parseLine(line) {
  // Task line: optional indent, - [ ] or - [x], then content
  const taskMatch = line.match(/^(\s*)- \[([ x])\] (.*)$/);
  if (taskMatch) {
    const indent = taskMatch[1].length;
    const checked = taskMatch[2] === 'x';
    let rest = taskMatch[3];

    // Highlight
    const highlighted = rest.startsWith('🟠 ');
    if (highlighted) rest = rest.slice('🟠 '.length);

    // Priority badge
    const priMatch = rest.match(/\[(P[123])\]/);
    const priority = priMatch ? priMatch[1] : null;
    if (priMatch) rest = rest.replace(/\s*\[P[123]\]\s*/, ' ').trim();

    // Due date
    const dueMatch = rest.match(/\(due:\s*(\d{4}-\d{2}-\d{2})\)/);
    const due = dueMatch ? dueMatch[1] : null;
    if (dueMatch) rest = rest.replace(/\s*\(due:\s*\d{4}-\d{2}-\d{2}\)\s*/, ' ').trim();

    // Delegation
    const delMatch = rest.match(/@delegated\(([^)]+)\)/);
    const delegated = delMatch ? delMatch[1] : null;
    if (delMatch) rest = rest.replace(/\s*@delegated\([^)]+\)\s*/, ' ').trim();

    return { type: 'task', indent, checked, highlighted, priority, due, delegated, text: rest.trim() };
  }

  // Heading
  const headMatch = line.match(/^(#{1,3}) (.+)$/);
  if (headMatch) {
    return { type: 'section', level: headMatch[1].length, text: headMatch[2].trim() };
  }

  // Non-checkbox indented bullet (notes/context)
  if (line.match(/^\s+- /)) {
    const text = line.replace(/^\s+- /, '').replace(/\\(.)/g, '$1');
    return { type: 'note', text };
  }

  return { type: 'blank' };
}

function isOverdue(due) {
  if (!due) return false;
  const today = new Date().toISOString().slice(0, 10);
  return due < today;
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  let sectionEl = null;
  let topGroup = null;   // block wrapper: .task row + .subtasks block as siblings
  let topTaskEl = null;  // the .task flex row for the current top-level task
  let subtasksEl = null; // the .subtasks block inside topGroup

  rawLines.forEach((line, idx) => {
    const p = parseLine(line);

    if (p.type === 'section') {
      if (p.level === 1) return; // area title — skip
      if (p.level === 2) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'section';
        const h = document.createElement('div');
        h.className = 'section-heading';
        h.textContent = p.text;
        sectionEl.appendChild(h);
        content.appendChild(sectionEl);
        topGroup = null; topTaskEl = null; subtasksEl = null;
      } else {
        // ### subsection
        const h = document.createElement('div');
        h.className = 'subsection-heading';
        h.textContent = p.text;
        (sectionEl || content).appendChild(h);
        topGroup = null; topTaskEl = null; subtasksEl = null;
      }
      return;
    }

    if (p.type === 'task') {
      const el = buildTaskEl(p, idx);
      if (p.indent === 0) {
        // Wrap each top-level task in a group so subtasks sit below as a block sibling
        const group = document.createElement('div');
        group.appendChild(el);
        (sectionEl || content).appendChild(group);
        topGroup = group;
        topTaskEl = el;
        subtasksEl = null;
      } else {
        if (topGroup) {
          if (!subtasksEl) {
            subtasksEl = document.createElement('div');
            subtasksEl.className = 'subtasks hidden';
            topGroup.appendChild(subtasksEl);
            // Wire chevron on the parent task row
            const chev = topTaskEl.querySelector('.chevron');
            if (chev) {
              chev.classList.remove('hidden');
              chev.textContent = '▶';
              chev.onclick = () => {
                const nowHidden = subtasksEl.classList.toggle('hidden');
                chev.textContent = nowHidden ? '▶' : '▼';
              };
            }
          }
          subtasksEl.appendChild(el);
        }
      }
      return;
    }

    if (p.type === 'note') {
      if (topGroup) {
        const note = document.createElement('div');
        note.className = 'note';
        note.textContent = p.text;
        (subtasksEl || topGroup).appendChild(note);
      }
      return;
    }
    // blank → ignore
  });
}

function buildTaskEl(p, lineIdx) {
  const wrap = document.createElement('div');
  wrap.className = 'task' + (p.checked ? ' completed' : '');

  // Left
  const left = document.createElement('div');
  left.className = 'task-left';

  const chev = document.createElement('button');
  chev.className = 'chevron hidden';
  chev.textContent = '▶';
  left.appendChild(chev);

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = p.checked;
  cb.onchange = () => toggleCheckbox(lineIdx);
  left.appendChild(cb);
  wrap.appendChild(left);

  // Body
  const body = document.createElement('div');
  body.className = 'task-body';

  const textEl = document.createElement('div');
  textEl.className = 'task-text';
  textEl.textContent = p.text;
  body.appendChild(textEl);

  if (p.priority || p.due || p.delegated) {
    const meta = document.createElement('div');
    meta.className = 'task-meta';
    if (p.priority) {
      const b = document.createElement('span');
      b.className = `badge badge-${p.priority.toLowerCase()}`;
      b.textContent = p.priority;
      meta.appendChild(b);
    }
    if (p.due) {
      const d = document.createElement('span');
      const overdue = isOverdue(p.due);
      d.className = 'due' + (overdue ? ' overdue' : '');
      d.textContent = (overdue ? '⚠ ' : '') + 'due ' + p.due;
      meta.appendChild(d);
    }
    if (p.delegated) {
      const d = document.createElement('span');
      d.className = 'badge badge-delegated';
      d.textContent = '@' + p.delegated;
      meta.appendChild(d);
    }
    body.appendChild(meta);
  }

  wrap.appendChild(body);

  // Right — highlight button
  const right = document.createElement('div');
  right.className = 'task-right';
  const hl = document.createElement('button');
  hl.className = 'btn-hl' + (p.highlighted ? ' on' : '');
  hl.title = p.highlighted ? 'Remove highlight' : 'Highlight';
  hl.textContent = '🟠';
  hl.onclick = () => toggleHighlight(lineIdx);
  right.appendChild(hl);
  wrap.appendChild(right);

  return wrap;
}

// ── Mutations ─────────────────────────────────────────────────────────────────

function toggleCheckbox(lineIdx) {
  const line = rawLines[lineIdx];
  if (/^(\s*)- \[ \]/.test(line)) {
    rawLines[lineIdx] = line.replace(/^(\s*)- \[ \]/, '$1- [x]');
  } else {
    rawLines[lineIdx] = line.replace(/^(\s*)- \[x\]/, '$1- [ ]');
  }
  save();
}

function toggleHighlight(lineIdx) {
  const line = rawLines[lineIdx];
  const withHL = line.match(/^(\s*- \[[ x]\] )🟠 (.*)$/);
  if (withHL) {
    rawLines[lineIdx] = withHL[1] + withHL[2];
  } else {
    const without = line.match(/^(\s*- \[[ x]\] )(.*)$/);
    if (without) rawLines[lineIdx] = without[1] + '🟠 ' + without[2];
  }
  save();
}

let saveTimer = null;

function save() {
  render();
  const indicator = document.getElementById('saving');
  indicator.classList.add('visible');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const content = rawLines.join('\n');
    try {
      await fetch(`/api/tasks/${currentArea}`, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain; charset=utf-8' },
        body: content,
      });
    } catch (e) {
      console.error('Save failed', e);
    }
    indicator.classList.remove('visible');
  }, 400); // small debounce so rapid clicks batch into one write
}

// ── Go ────────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
