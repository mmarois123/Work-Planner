<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Work Planner</title>
<style>
  :root {
    --bg: #f5f5f5; --card: #fff; --border: #e0e0e0;
    --accent: #2563eb; --accent-light: #dbeafe;
    --text: #1e293b; --muted: #64748b;
    --done: #94a3b8; --delegated: #f59e0b;
    --danger: #ef4444; --success: #22c55e;
    --p1: #ef4444; --p2: #f59e0b; --p3: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; }

  /* Top bar */
  header { background: var(--accent); color: #fff; padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; }
  .header-actions { display: flex; gap: 8px; }
  .header-actions button { background: rgba(255,255,255,0.2); color: #fff;
    border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px; }
  .header-actions button:hover { background: rgba(255,255,255,0.3); }

  /* Tabs */
  .tabs { display: flex; gap: 0; overflow-x: auto; background: var(--card);
    border-bottom: 1px solid var(--border); padding: 0 12px; }
  .tab { padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap;
    min-height: 44px; display: flex; align-items: center; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }
  .tab .count { background: var(--accent-light); color: var(--accent);
    font-size: 11px; border-radius: 10px; padding: 1px 7px; margin-left: 6px; }

  /* Main */
  main { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* Area card */
  .area { margin-bottom: 24px; }
  .area-title { font-size: 16px; font-weight: 600; color: var(--accent);
    margin-bottom: 8px; padding: 4px 0; }

  /* Section */
  .section { background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .section-header { padding: 10px 14px; font-size: 13px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border); display: flex;
    justify-content: space-between; align-items: center; cursor: pointer;
    user-select: none; }
  .section.collapsed .section-header { border-bottom: none; }
  .section.collapsed .section-body { display: none; }
  .section-header .chevron { font-size: 12px; margin-right: 6px; transition: transform 0.15s;
    display: inline-block; color: var(--muted); }
  .section.collapsed .chevron { transform: rotate(-90deg); }
  .section-header .section-right { display: flex; align-items: center; gap: 4px; }
  .section-header .task-count { font-size: 11px; color: var(--muted); font-weight: 400; }
  .section-header .add-btn { background: none; border: none; color: var(--accent);
    cursor: pointer; font-size: 18px; font-weight: 700; line-height: 1;
    width: 28px; height: 28px; border-radius: 4px; }
  .section-header .add-btn:hover { background: var(--accent-light); }

  /* Task row */
  .task { display: flex; align-items: center; padding: 8px 14px; gap: 10px;
    border-bottom: 1px solid var(--border); min-height: 44px; cursor: pointer; }
  .task:last-child { border-bottom: none; }
  .task:hover { background: #f8fafc; }
  .task input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer;
    accent-color: var(--accent); flex-shrink: 0; }
  .task-text { flex: 1; font-size: 14px; }
  .task.done { opacity: 0.55; }
  .task.done .task-text { text-decoration: line-through; color: var(--done); }
  .task-meta { display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
  .badge-delegated { background: #fef3c7; color: #92400e; }
  .badge-p1 { background: #fef2f2; color: var(--p1); }
  .badge-p2 { background: #fffbeb; color: #b45309; }
  .badge-p3 { background: #eff6ff; color: var(--p3); }
  .badge-due { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 500; }
  .badge-overdue { background: #fef2f2; color: var(--danger); }
  .badge-today { background: #fffbeb; color: #b45309; }
  .badge-future { background: #f1f5f9; color: var(--muted); }
  .badge-tag { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 500;
    color: #fff; }
  .subtask-count { font-size: 10px; color: var(--muted); white-space: nowrap; }

  /* Task grid header + row */
  .task-grid-header {
    display: grid;
    grid-template-columns: 28px 1fr 110px 70px 100px auto 28px;
    align-items: center;
    padding: 6px 14px;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px 8px 0 0;
    margin-bottom: -1px;
  }
  .task-row {
    display: grid;
    grid-template-columns: 28px 1fr 110px 70px 100px auto 28px;
    align-items: center;
    padding: 6px 14px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    min-height: 40px;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: #f8fafc; }
  .task-row.done { opacity: 0.55; }
  .task-row.done .task-title { text-decoration: line-through; color: var(--done); }
  .task-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer;
    accent-color: var(--accent); flex-shrink: 0; }
  .task-title { font-size: 14px; cursor: pointer; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .task-title:hover { color: var(--accent); }
  .task-badges { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .task-row-delete { background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 16px; padding: 0; line-height: 1; opacity: 0; transition: opacity 0.15s; }
  .task-row:hover .task-row-delete { opacity: 0.6; }
  .task-row-delete:hover { opacity: 1 !important; color: var(--danger); }

  /* Inline editable controls */
  .inline-date { padding: 2px 4px; border: 1px solid transparent; border-radius: 4px;
    font-size: 12px; font-family: inherit; background: transparent; width: 100%; }
  .inline-date:hover, .inline-date:focus { border-color: var(--border); background: var(--card); }
  .inline-date:focus { outline: none; border-color: var(--accent); }
  .inline-priority, .inline-recurrence { padding: 2px 4px; border: 1px solid transparent;
    border-radius: 4px; font-size: 12px; background: transparent; cursor: pointer;
    width: 100%; appearance: none; -webkit-appearance: none; }
  .inline-priority:hover, .inline-recurrence:hover { border-color: var(--border); background: var(--card); }
  .inline-priority:focus, .inline-recurrence:focus { outline: none; border-color: var(--accent); }

  /* Add task form (inline) */
  .add-form { display: flex; gap: 8px; padding: 8px 14px;
    border-top: 1px solid var(--border); }
  .add-form input { flex: 1; padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; }
  .add-form button { background: var(--accent); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .add-form .cancel-btn { background: none; color: var(--muted); border: 1px solid var(--border); }
  .hidden { display: none !important; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }

  /* Empty state */
  .empty { color: var(--muted); font-size: 13px; padding: 12px 14px;
    font-style: italic; }

  /* Delegated view */
  .delegated-section { margin-bottom: 8px; }
  .delegated-owner { font-size: 14px; font-weight: 600; color: var(--delegated);
    padding: 8px 0 4px; }

  /* Modal overlay */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 50; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--card); border-radius: 12px; width: 95%; max-width: 720px;
    max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--muted); width: 32px; height: 32px; border-radius: 6px; }
  .modal-close:hover { background: var(--bg); }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px; }

  /* Buttons */
  .btn-primary { background: var(--accent); color: #fff; border: none;
    padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .btn-secondary:hover { border-color: var(--muted); }
  .btn-danger { background: var(--danger); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-danger:hover { opacity: 0.9; }

  /* Task Detail Modal */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .detail-field { display: flex; flex-direction: column; gap: 4px; }
  .detail-field.full { grid-column: 1 / -1; }
  .detail-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; }
  .detail-input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; font-family: inherit; }
  .detail-input:focus { outline: none; border-color: var(--accent); }
  .detail-textarea { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: 'SFMono-Regular', Consolas, monospace; min-height: 80px;
    resize: vertical; }
  .detail-textarea:focus { outline: none; border-color: var(--accent); }
  select.detail-input { cursor: pointer; }

  /* Subtasks in detail */
  .subtask-list { margin-top: 4px; }
  .subtask-item { display: flex; align-items: center; gap: 8px; padding: 4px 0;
    border-bottom: 1px solid #f1f5f9; }
  .subtask-item:last-child { border-bottom: none; }
  .subtask-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
  .subtask-item .subtask-text { flex: 1; font-size: 13px; }
  .subtask-item.done .subtask-text { text-decoration: line-through; color: var(--done); }
  .subtask-item .subtask-delete { background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; opacity: 0.5; }
  .subtask-item .subtask-delete:hover { opacity: 1; color: var(--danger); }
  .subtask-add { display: flex; gap: 6px; margin-top: 6px; }
  .subtask-add input { flex: 1; padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 13px; }
  .subtask-add button { padding: 4px 10px; font-size: 12px; }

  /* Inline expandable subtasks */
  .subtask-expand-btn { background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 10px; padding: 2px 4px; transition: transform 0.15s; display: inline-block; }
  .subtask-expand-btn:hover { color: var(--text); }
  .subtask-expand-btn.expanded { transform: rotate(90deg); }
  .inline-subtasks { padding: 2px 0 6px 42px; border-bottom: 1px solid var(--border);
    background: var(--bg); }
  .inline-subtask-item { display: flex; align-items: center; gap: 6px; padding: 3px 8px;
    font-size: 13px; color: var(--text); }
  .inline-subtask-item.done { color: var(--done); }
  .inline-subtask-item.done .inline-subtask-text { text-decoration: line-through; }
  .inline-subtask-item input[type="checkbox"] { cursor: pointer; }

  /* Tags in detail */
  .tag-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tag-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
    border-radius: 10px; font-size: 11px; font-weight: 500; color: #fff; }
  .tag-pill .tag-remove { background: none; border: none; color: rgba(255,255,255,0.7);
    cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
  .tag-pill .tag-remove:hover { color: #fff; }
  .tag-add-row { display: flex; gap: 6px; margin-top: 6px; }
  .tag-add-row select, .tag-add-row input { padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 12px; }
  .tag-add-row button { padding: 4px 10px; font-size: 12px; }

  /* Recurrence */
  .recurrence-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .dow-checkboxes { display: flex; gap: 4px; margin-top: 4px; }
  .dow-checkboxes label { font-size: 11px; display: flex; align-items: center; gap: 2px;
    padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
  .dow-checkboxes label.active { background: var(--accent-light); border-color: var(--accent); }
  .dow-checkboxes input { display: none; }

  /* Timestamps */
  .detail-timestamps { font-size: 11px; color: var(--muted); margin-top: 12px;
    padding-top: 8px; border-top: 1px solid var(--border); }

  /* Drawer (task detail) */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    z-index: 50;
  }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 480px; max-width: 100%;
    background: var(--card);
    box-shadow: -4px 0 20px rgba(0,0,0,0.15);
    display: flex; flex-direction: column;
    z-index: 51;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; }
  .drawer-header h2 { font-size: 16px; font-weight: 600; }
  .drawer-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .drawer-footer { padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px; }

  /* Inbox */
  .inbox-textarea { width: 100%; min-height: 120px; padding: 10px; border: 1px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 14px; resize: vertical; }
  .inbox-textarea:focus { outline: none; border-color: var(--accent); }
  .inbox-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .inbox-actions .file-label { font-size: 13px; color: var(--muted); cursor: pointer;
    border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; }
  .inbox-actions .file-label:hover { border-color: var(--accent); color: var(--accent); }

  /* Inbox preview table */
  .inbox-preview { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
  .inbox-preview th { text-align: left; padding: 8px 6px; color: var(--muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border); }
  .inbox-preview td { padding: 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .inbox-preview tr:last-child td { border-bottom: none; }
  .inbox-preview input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
  .inbox-preview .task-input { width: 100%; border: 1px solid transparent; padding: 4px 6px;
    border-radius: 4px; font-size: 13px; font-family: inherit; }
  .inbox-preview .task-input:focus { outline: none; border-color: var(--accent); }
  .inbox-preview select { padding: 4px 6px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 12px; background: var(--card); }
  .conf-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .conf-high { background: var(--success); }
  .conf-medium { background: var(--delegated); }
  .conf-low { background: var(--danger); }

  /* Spinner */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .inbox-status { text-align: center; padding: 24px; color: var(--muted); font-size: 14px; }

  /* Summary */
  .summary-content { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .summary-content h2 { font-size: 15px; font-weight: 600; color: var(--accent);
    margin: 16px 0 4px; }
  .summary-content ul { margin: 0 0 8px 16px; }
  .summary-content li { margin-bottom: 2px; }

  /* Upcoming view */
  .upcoming-group { margin-bottom: 16px; }
  .upcoming-group-title { font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 0 4px;
    border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .upcoming-task-area { font-size: 10px; color: var(--muted); margin-left: 4px; }

  /* Calendar view */
  .cal-nav { display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 12px 0; }
  .cal-nav button { background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 12px; cursor: pointer; font-size: 14px; }
  .cal-nav button:hover { background: var(--accent-light); }
  .cal-month { font-size: 16px; font-weight: 600; min-width: 180px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; }
  .cal-header { background: var(--bg); padding: 6px; text-align: center;
    font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  .cal-day { background: var(--card); min-height: 70px; padding: 4px 6px;
    cursor: pointer; position: relative; }
  .cal-day:hover { background: #f8fafc; }
  .cal-day.other-month { opacity: 0.4; }
  .cal-day.today { background: var(--accent-light); }
  .cal-day-num { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .cal-dot-row { display: flex; gap: 2px; flex-wrap: wrap; }
  .cal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .cal-dot.overdue { background: var(--danger); }
  .cal-count { font-size: 10px; color: var(--muted); }
  .cal-day-tasks { margin-top: 12px; }

  /* Login screen */
  #login-screen {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 200; display: flex; align-items: center; justify-content: center;
  }
  #login-screen.hidden { display: none; }
  .login-box {
    background: var(--card); padding: 32px; border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center;
    width: 320px; max-width: 90%;
  }
  .login-box h2 { margin-bottom: 20px; font-size: 20px; color: var(--accent); }
  .login-box input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 16px; text-align: center; margin-bottom: 12px;
  }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
  }
  .login-box button:hover { opacity: 0.9; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 20px; }

  /* Mobile responsive */
  @media (max-width: 640px) {
    header { padding: 10px 12px; }
    header h1 { font-size: 15px; }
    .header-actions { gap: 4px; flex-wrap: wrap; }
    .header-actions button { padding: 6px 8px; font-size: 11px; }

    .tabs { padding: 0 4px; }
    .tab { padding: 8px 10px; font-size: 13px; min-height: 44px; }

    main { padding: 8px; }

    /* Hide grid headers on mobile */
    .task-grid-header { display: none; }

    /* Collapse task row to fewer columns */
    .task-row {
      grid-template-columns: 28px 1fr auto 28px;
      padding: 8px 10px;
    }
    .task-row .inline-date,
    .task-row .inline-priority,
    .task-row .inline-recurrence { display: none; }

    /* Drawer full-width on mobile */
    .drawer { width: 100%; }
    .detail-grid { grid-template-columns: 1fr; }

    /* Ensure touch targets are at least 44px */
    .section-header { min-height: 44px; }
    .task-row { min-height: 44px; }
    .tab { min-height: 44px; }
  }
</style>
</head>
<body>

<div id="login-screen" class="hidden">
  <div class="login-box">
    <h2>Work Planner</h2>
    <input type="password" id="login-pin" placeholder="Enter PIN"
      onkeydown="if(event.key==='Enter')submitLogin()">
    <button onclick="submitLogin()">Login</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<header>
  <h1>Work Planner</h1>
  <div class="header-actions">
    <button onclick="refreshTasks()">Refresh</button>
    <button onclick="showDelegated()">Delegated</button>
    <button onclick="clearCompleted()">Clear completed</button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<main id="main"><div class="inbox-status"><span class="spinner"></span>Loading tasks...</div></main>
<div class="toast" id="toast"></div>

<script>
const API = '';
let allData = null;
let activeTab = 'all';
const collapsedSections = new Set();
const expandedSubtasks = new Set();
let allTags = [];
const togglingTasks = new Set();

// ---- State helpers (optimistic UI) ----

function findTaskInState(taskId) {
  if (!allData) return null;
  for (const area of allData.areas) {
    for (const section of area.sections) {
      const idx = section.tasks.findIndex(t => t.id === taskId);
      if (idx !== -1) return { area, section, task: section.tasks[idx], taskIndex: idx };
    }
  }
  return null;
}

function updateTaskInState(taskId, changes) {
  const found = findTaskInState(taskId);
  if (!found) return null;
  const prev = {};
  for (const key of Object.keys(changes)) {
    prev[key] = found.task[key];
    found.task[key] = changes[key];
  }
  return prev;
}

function removeTaskFromState(taskId) {
  const found = findTaskInState(taskId);
  if (!found) return null;
  found.section.tasks.splice(found.taskIndex, 1);
  return { area: found.area, section: found.section, task: found.task, taskIndex: found.taskIndex };
}

function findSubtaskInState(subtaskId) {
  if (!allData) return null;
  for (const area of allData.areas) {
    for (const section of area.sections) {
      for (const task of section.tasks) {
        if (task.subtasks) {
          const idx = task.subtasks.findIndex(s => s.id === subtaskId);
          if (idx !== -1) return { task, subtask: task.subtasks[idx], subtaskIndex: idx };
        }
      }
    }
  }
  return null;
}

// ---- Auth ----

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-pin').focus();
}

function hideLogin() {
  document.getElementById('login-screen').classList.add('hidden');
}

async function submitLogin() {
  const pin = document.getElementById('login-pin').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pin})
    });
    if (res.ok) {
      localStorage.setItem('wp_pin', pin);
      hideLogin();
      fetchTasks();
    } else {
      errEl.textContent = 'Invalid PIN';
    }
  } catch (e) {
    errEl.textContent = 'Connection error';
  }
}

// Add auth header backup (cookie is primary, this is fallback)
const _origFetch = window.fetch;
window.fetch = function(url, opts = {}) {
  const pin = localStorage.getItem('wp_pin');
  if (pin && typeof url === 'string' && url.includes('/api/')) {
    opts.headers = Object.assign({'X-Auth-PIN': pin}, opts.headers || {});
  }
  return _origFetch.call(window, url, opts);
};

// ---- Data fetching ----

async function fetchTasks() {
  try {
    const res = await fetch(`${API}/api/init`);
    if (res.status === 401) {
      showLogin();
      return;
    }
    const data = await res.json();
    allData = { areas: data.areas };
    allTags = data.tags || [];
    hideLogin();
    renderTabs();
    renderMain();
  } catch (e) {
    console.error('Failed to fetch tasks:', e);
  }
}

// ---- Tabs ----

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const counts = {};
  let totalOpen = 0;
  for (const area of allData.areas) {
    let c = 0;
    for (const s of area.sections) c += s.tasks.filter(t => !t.done).length;
    counts[area.key] = c;
    totalOpen += c;
  }

  let html = `<div class="tab ${activeTab === 'all' ? 'active' : ''}" onclick="switchTab('all')">
    All<span class="count">${totalOpen}</span></div>`;
  for (const area of allData.areas) {
    const label = area.title.replace('Planyfi — ', '');
    html += `<div class="tab ${activeTab === area.key ? 'active' : ''}" onclick="switchTab('${area.key}')">
      ${label}${counts[area.key] ? `<span class="count">${counts[area.key]}</span>` : ''}</div>`;
  }
  // Virtual tabs
  html += `<div class="tab ${activeTab === 'upcoming' ? 'active' : ''}" onclick="switchTab('upcoming')">Upcoming</div>`;
  html += `<div class="tab ${activeTab === 'calendar' ? 'active' : ''}" onclick="switchTab('calendar')">Calendar</div>`;
  tabs.innerHTML = html;
}

function switchTab(tab) {
  activeTab = tab;
  renderTabs();
  if (tab === 'upcoming') renderUpcoming();
  else if (tab === 'calendar') renderCalendar();
  else renderMain();
}

// ---- Main rendering ----

function renderMain() {
  const main = document.getElementById('main');
  const areas = activeTab === 'all' ? allData.areas : allData.areas.filter(a => a.key === activeTab);
  let html = '';

  // Grid column header
  html += `<div class="task-grid-header">
    <span></span><span>Task</span><span>Due</span><span>Priority</span><span>Recurrence</span><span></span><span></span>
  </div>`;

  for (const area of areas) {
    html += `<div class="area">`;
    if (activeTab === 'all') html += `<div class="area-title">${area.title}</div>`;

    for (const section of area.sections) {
      const sid = `${area.key}-${esc(section.name)}`;
      const collapsed = collapsedSections.has(sid);
      const openCount = section.tasks.filter(t => !t.done).length;
      html += `<div class="section ${collapsed ? 'collapsed' : ''}" id="sec-${sid}">
        <div class="section-header" onclick="toggleSection('${sid}')">
          <span><span class="chevron">&#9660;</span>${section.name}</span>
          <div class="section-right">
            <span class="task-count">${openCount}</span>
          </div>
        </div>`;

      html += `<div class="section-body">`;
      if (section.tasks.length === 0) {
        html += `<div class="empty">No tasks</div>`;
      }
      for (const task of section.tasks) {
        html += renderTask(area.key, task);
      }

      html += `</div></div>`;
    }
    html += `</div>`;
  }

  main.innerHTML = html;
}

function renderTask(areaKey, task) {
  let badges = '';

  // Tags
  if (task.tags && task.tags.length) {
    for (const tag of task.tags) {
      badges += `<span class="badge-tag" style="background:${tag.color}">${escHtml(tag.name)}</span>`;
    }
  }

  // Subtask progress
  const hasSubtasks = task.subtasks && task.subtasks.length;
  if (hasSubtasks) {
    const done = task.subtasks.filter(s => s.done).length;
    const isExpanded = expandedSubtasks.has(task.id);
    badges += `<button class="subtask-expand-btn ${isExpanded ? 'expanded' : ''}"
      onclick="event.stopPropagation();toggleInlineSubtasks(${task.id})"
      title="Toggle subtasks">&#9654;</button>`;
    badges += `<span class="subtask-count">${done}/${task.subtasks.length}</span>`;
  }

  // Delegated badge
  if (task.delegated_to) {
    badges += `<span class="badge badge-delegated">${escHtml(task.delegated_to)}</span>`;
  }

  // Read-only priority badge
  const priLabel = task.priority ? `P${task.priority}` : '';
  // Read-only recurrence badge
  const recPattern = task.recurrence ? task.recurrence.pattern : '';
  const recLabel = recPattern ? recPattern.charAt(0).toUpperCase() + recPattern.slice(1) : '';

  let html = `<div class="task-row ${task.done ? 'done' : ''}" data-id="${task.id}">
    <input type="checkbox" ${task.done ? 'checked' : ''} onclick="event.stopPropagation();toggleTask(${task.id})">
    <span class="task-title" onclick="openDetail(${task.id})">${escHtml(task.title)}</span>
    <span class="inline-date">${task.due_date ? `<span class="badge-due ${dueDateClass(task.due_date,task.done)}">${formatDueDate(task.due_date)}</span>` : ''}</span>
    <span class="inline-priority">${priLabel ? `<span class="badge badge-p${task.priority}">${priLabel}</span>` : ''}</span>
    <span class="inline-recurrence">${recLabel ? `<span class="badge" style="background:#8b5cf6;color:#fff">${recLabel}</span>` : ''}</span>
    <div class="task-badges">${badges}</div>
    <button class="task-row-delete" onclick="event.stopPropagation();deleteTaskFromRow(${task.id})" title="Delete task">&times;</button>
  </div>`;
  if (hasSubtasks && expandedSubtasks.has(task.id)) {
    html += renderInlineSubtasks(task);
  }
  return html;
}

// ---- Inline subtasks ----

function renderInlineSubtasks(task) {
  let items = '';
  for (const st of task.subtasks) {
    items += `<div class="inline-subtask-item ${st.done ? 'done' : ''}">
      <input type="checkbox" ${st.done ? 'checked' : ''}
        onclick="event.stopPropagation();toggleInlineSubtaskDone(${st.id},${task.id})">
      <span class="inline-subtask-text">${escHtml(st.title)}</span>
    </div>`;
  }
  return `<div class="inline-subtasks">${items}</div>`;
}

function toggleInlineSubtasks(taskId) {
  if (expandedSubtasks.has(taskId)) expandedSubtasks.delete(taskId);
  else expandedSubtasks.add(taskId);
  renderMain();
}

async function toggleInlineSubtaskDone(subtaskId, taskId) {
  const found = findSubtaskInState(subtaskId);
  if (!found) return;
  const prevDone = found.subtask.done;
  found.subtask.done = prevDone ? 0 : 1;
  renderMain();
  try {
    const res = await fetch(`${API}/api/subtasks/${subtaskId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'toggle'})
    });
    if (!res.ok) throw new Error('Server error');
  } catch (e) {
    found.subtask.done = prevDone;
    renderMain();
    toast('Failed to update subtask', true);
  }
}

// ---- Due date helpers ----

function dueDateClass(dateStr, done) {
  if (done) return 'badge-future';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  if (d < today) return 'badge-overdue';
  if (d.getTime() === today.getTime()) return 'badge-today';
  return 'badge-future';
}

function formatDueDate(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return `${-diff}d overdue`;
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff <= 7) return d.toLocaleDateString('en', {weekday: 'short'});
  return d.toLocaleDateString('en', {month: 'short', day: 'numeric'});
}

// ---- Actions ----

async function toggleTask(taskId) {
  if (togglingTasks.has(taskId)) return;
  togglingTasks.add(taskId);
  const prev = updateTaskInState(taskId, { done: findTaskInState(taskId)?.task.done ? 0 : 1 });
  if (!prev) { togglingTasks.delete(taskId); return; }
  renderTabs();
  renderMain();
  try {
    const res = await fetch(`${API}/api/tasks/${taskId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'toggle'})
    });
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    if (data.recurring) await fetchTasks();
  } catch (e) {
    updateTaskInState(taskId, prev);
    renderTabs();
    renderMain();
    toast('Failed to toggle task', true);
  } finally {
    togglingTasks.delete(taskId);
  }
}

async function clearCompleted() {
  const res = await fetch(`${API}/api/archive`, {method: 'POST'});
  const data = await res.json();
  if (data.archived === 0) {
    toast('No completed tasks to clear');
  } else {
    toast(`Cleared ${data.archived} completed task${data.archived > 1 ? 's' : ''}`);
    await fetchTasks();
  }
}

function toggleSection(sid) {
  const el = document.getElementById('sec-' + sid);
  if (collapsedSections.has(sid)) {
    collapsedSections.delete(sid);
    el.classList.remove('collapsed');
  } else {
    collapsedSections.add(sid);
    el.classList.add('collapsed');
  }
}

// ---- Task Detail Drawer ----

let detailTask = null;

async function openDetail(taskId) {
  if (taskId < 0) { toast('Task is still saving...'); return; }
  const res = await fetch(`${API}/api/tasks/${taskId}`);
  if (!res.ok) { toast('Task not found'); return; }
  detailTask = await res.json();
  renderDetail();
}

function renderDetail() {
  const t = detailTask;
  if (!t) return;

  const existing = document.getElementById('detail-modal');
  if (existing) existing.remove();

  const wrapper = document.createElement('div');
  wrapper.id = 'detail-modal';

  const overlay = document.createElement('div');
  overlay.className = 'drawer-overlay';
  overlay.onclick = () => closeDetail();

  // Read-only subtasks
  let subtasksHtml = '<div class="subtask-list">';
  for (const s of (t.subtasks || [])) {
    subtasksHtml += `<div class="subtask-item ${s.done ? 'done' : ''}">
      <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleSubtask(${s.id})">
      <span class="subtask-text">${escHtml(s.title)}</span>
    </div>`;
  }
  subtasksHtml += '</div>';

  // Read-only tags
  let tagsHtml = '<div class="tag-pills">';
  for (const tag of (t.tags || [])) {
    tagsHtml += `<span class="tag-pill" style="background:${tag.color}">${escHtml(tag.name)}</span>`;
  }
  tagsHtml += '</div>';

  // Recurrence label
  const rec = t.recurrence;
  const recLabel = rec ? rec.pattern.charAt(0).toUpperCase() + rec.pattern.slice(1) : 'None';

  const drawer = document.createElement('div');
  drawer.className = 'drawer';
  drawer.innerHTML = `
      <div class="drawer-header">
        <h2>Task Detail</h2>
        <button class="modal-close" onclick="closeDetail()">&times;</button>
      </div>
      <div class="drawer-body">
        <div class="detail-field full" style="margin-bottom:12px">
          <div style="font-size:16px;font-weight:600">${escHtml(t.title)}</div>
        </div>

        <div class="detail-grid">
          <div class="detail-field">
            <span class="detail-label">Due Date</span>
            <span class="detail-value">${t.due_date || 'None'}</span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Priority</span>
            <span class="detail-value">${t.priority ? 'P'+t.priority : 'None'}</span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Delegated To</span>
            <span class="detail-value">${escHtml(t.delegated_to || 'None')}</span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Status</span>
            <span class="detail-value">${t.done ? 'Done' : 'Open'}</span>
          </div>
        </div>

        <div class="detail-field full" style="margin-bottom:12px">
          <span class="detail-label">Recurrence</span>
          <span class="detail-value">${recLabel}</span>
        </div>

        ${(t.tags && t.tags.length) ? `<div class="detail-field full" style="margin-bottom:12px">
          <span class="detail-label">Tags</span>
          ${tagsHtml}
        </div>` : ''}

        ${(t.subtasks && t.subtasks.length) ? `<div class="detail-field full" style="margin-bottom:12px">
          <span class="detail-label">Subtasks</span>
          ${subtasksHtml}
        </div>` : ''}

        ${t.description ? `<div class="detail-field full">
          <span class="detail-label">Description</span>
          <div class="detail-value" style="white-space:pre-wrap">${escHtml(t.description)}</div>
        </div>` : ''}

        <div class="detail-timestamps">
          Created: ${t.created_at ? new Date(t.created_at).toLocaleString() : 'N/A'}
          ${t.completed_at ? ' | Completed: ' + new Date(t.completed_at).toLocaleString() : ''}
        </div>
      </div>
      <div class="drawer-footer">
        <button class="btn-danger" onclick="deleteTaskFromDetail(${t.id})">Delete</button>
        <div style="flex:1"></div>
        <button class="btn-secondary" onclick="closeDetail()">Close</button>
      </div>`;

  wrapper.appendChild(overlay);
  wrapper.appendChild(drawer);
  document.body.appendChild(wrapper);
  requestAnimationFrame(() => requestAnimationFrame(() => drawer.classList.add('open')));
}

async function deleteTaskFromRow(taskId) {
  if (!confirm('Delete this task?')) return;
  const removed = removeTaskFromState(taskId);
  toast('Task deleted');
  renderTabs();
  renderMain();
  try {
    const res = await fetch(`${API}/api/tasks/${taskId}`, {method: 'DELETE'});
    if (!res.ok) throw new Error('Server error');
  } catch (e) {
    if (removed) {
      removed.section.tasks.splice(removed.taskIndex, 0, removed.task);
      renderTabs();
      renderMain();
    }
    toast('Failed to delete task', true);
  }
}

async function deleteTaskFromDetail(taskId) {
  if (!confirm('Delete this task?')) return;
  const removed = removeTaskFromState(taskId);
  closeDetail();
  toast('Task deleted');
  renderTabs();
  renderMain();
  try {
    const res = await fetch(`${API}/api/tasks/${taskId}`, {method: 'DELETE'});
    if (!res.ok) throw new Error('Server error');
  } catch (e) {
    if (removed) {
      removed.section.tasks.splice(removed.taskIndex, 0, removed.task);
      renderTabs();
      renderMain();
    }
    toast('Failed to delete task', true);
  }
}

function closeDetail() {
  const el = document.getElementById('detail-modal');
  if (!el) { detailTask = null; return; }
  const drawer = el.querySelector('.drawer');
  if (drawer) {
    drawer.classList.remove('open');
    setTimeout(() => el.remove(), 250);
  } else {
    el.remove();
  }
  detailTask = null;
}

// ---- Subtask actions ----

async function toggleSubtask(subId) {
  await fetch(`${API}/api/subtasks/${subId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'toggle'})
  });
  await refreshDetail();
}

async function refreshDetail() {
  if (!detailTask) return;
  const res = await fetch(`${API}/api/tasks/${detailTask.id}`);
  if (res.ok) {
    detailTask = await res.json();
    renderDetail();
  }
}

// ---- Delegated view ----

async function showDelegated() {
  const res = await fetch(`${API}/api/delegated`);
  const data = await res.json();
  const main = document.getElementById('main');

  if (data.delegated.length === 0) {
    main.innerHTML = '<div class="area"><div class="area-title">Delegated Tasks</div><div class="empty">No delegated tasks</div></div>';
    activeTab = '';
    renderTabs();
    return;
  }

  const grouped = {};
  for (const t of data.delegated) {
    const owner = t.delegated_to;
    if (!grouped[owner]) grouped[owner] = [];
    grouped[owner].push(t);
  }

  let html = '<div class="area"><div class="area-title">Delegated Tasks</div>';
  for (const [owner, tasks] of Object.entries(grouped)) {
    html += `<div class="delegated-section"><div class="delegated-owner">${escHtml(owner)}</div>
      <div class="section">`;
    for (const t of tasks) {
      html += `<div class="task" onclick="openDetail(${t.id})">
        <input type="checkbox" ${t.done ? 'checked' : ''} onclick="event.stopPropagation();toggleTask(${t.id})">
        <span class="task-text">${escHtml(t.text)}</span>
        <div class="task-meta"><span class="badge badge-delegated">${escHtml(t.area)}</span></div>
      </div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';

  main.innerHTML = html;
  activeTab = '';
  renderTabs();
}

// ---- Upcoming view ----

async function renderUpcoming() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="inbox-status"><span class="spinner"></span>Loading...</div>';

  const [overdueRes, todayRes, upcomingRes, nodateRes] = await Promise.all([
    fetch(`${API}/api/tasks/due/overdue`),
    fetch(`${API}/api/tasks/due/today`),
    fetch(`${API}/api/tasks/due/upcoming?days=14`),
    fetch(`${API}/api/tasks/due/no-date`),
  ]);
  const overdue = (await overdueRes.json()).tasks;
  const todayTasks = (await todayRes.json()).tasks;
  const upcoming = (await upcomingRes.json()).tasks;
  const noDate = (await nodateRes.json()).tasks;

  // Group upcoming by relative day
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
  const endOfWeek = new Date(today); endOfWeek.setDate(endOfWeek.getDate()+(7-today.getDay()));
  const endOfNextWeek = new Date(endOfWeek); endOfNextWeek.setDate(endOfNextWeek.getDate()+7);

  const groups = {
    'Overdue': overdue,
    'Today': todayTasks,
    'Tomorrow': [],
    'This Week': [],
    'Next Week': [],
    'Later': [],
  };

  for (const t of upcoming) {
    const d = new Date(t.due_date + 'T00:00:00');
    if (d.getTime() === today.getTime()) continue; // already in Today
    if (d.getTime() === tomorrow.getTime()) groups['Tomorrow'].push(t);
    else if (d <= endOfWeek) groups['This Week'].push(t);
    else if (d <= endOfNextWeek) groups['Next Week'].push(t);
    else groups['Later'].push(t);
  }

  let html = '<div class="area"><div class="area-title">Upcoming</div>';
  for (const [label, tasks] of Object.entries(groups)) {
    if (!tasks.length) continue;
    html += `<div class="upcoming-group">
      <div class="upcoming-group-title">${label} (${tasks.length})</div>
      <div class="section">`;
    for (const t of tasks) {
      html += `<div class="task ${t.done?'done':''}" onclick="openDetail(${t.id})">
        <input type="checkbox" ${t.done?'checked':''} onclick="event.stopPropagation();toggleTask(${t.id})">
        <span class="task-text">${escHtml(t.title)}
          <span class="upcoming-task-area">${escHtml(t.area_title)} / ${escHtml(t.section_name)}</span>
        </span>
        <div class="task-meta">
          ${t.priority ? `<span class="badge badge-p${t.priority}">P${t.priority}</span>` : ''}
          ${t.due_date ? `<span class="badge-due ${dueDateClass(t.due_date,t.done)}">${formatDueDate(t.due_date)}</span>` : ''}
        </div>
      </div>`;
    }
    html += '</div></div>';
  }

  if (noDate.length) {
    html += `<div class="upcoming-group">
      <div class="upcoming-group-title">No Due Date (${noDate.length})</div>
      <div class="section">`;
    for (const t of noDate) {
      html += `<div class="task" onclick="openDetail(${t.id})">
        <input type="checkbox" onclick="event.stopPropagation();toggleTask(${t.id})">
        <span class="task-text">${escHtml(t.title)}
          <span class="upcoming-task-area">${escHtml(t.area_title)} / ${escHtml(t.section_name)}</span>
        </span>
      </div>`;
    }
    html += '</div></div>';
  }

  html += '</div>';
  main.innerHTML = html;
}

// ---- Calendar view ----

let calYear, calMonth;
{
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

async function renderCalendar() {
  const main = document.getElementById('main');
  const start = new Date(calYear, calMonth, 1);
  const end = new Date(calYear, calMonth + 1, 0);
  const startStr = start.toISOString().slice(0,10);
  const endStr = end.toISOString().slice(0,10);

  const res = await fetch(`${API}/api/tasks/due/calendar?start=${startStr}&end=${endStr}`);
  const data = await res.json();
  const tasks = data.tasks || [];

  // Group by date
  const byDate = {};
  for (const t of tasks) {
    if (!byDate[t.due_date]) byDate[t.due_date] = [];
    byDate[t.due_date].push(t);
  }

  const monthName = start.toLocaleDateString('en', {month: 'long', year: 'numeric'});
  let html = `<div class="cal-nav">
    <button onclick="calPrev()">&larr;</button>
    <span class="cal-month">${monthName}</span>
    <button onclick="calNext()">&rarr;</button>
  </div>`;

  html += '<div class="cal-grid">';
  // Headers
  for (const d of ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']) {
    html += `<div class="cal-header">${d}</div>`;
  }

  // Fill grid
  const firstDow = start.getDay();
  const daysInMonth = end.getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  // Previous month padding
  for (let i = 0; i < firstDow; i++) {
    html += '<div class="cal-day other-month"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = new Date(dateStr+'T00:00:00').getTime() === today.getTime();
    const dayTasks = byDate[dateStr] || [];

    html += `<div class="cal-day ${isToday?'today':''}" onclick="calDayClick('${dateStr}')">
      <div class="cal-day-num">${d}</div>`;
    if (dayTasks.length) {
      html += '<div class="cal-dot-row">';
      const show = Math.min(dayTasks.length, 4);
      for (let i = 0; i < show; i++) {
        const overdue = !dayTasks[i].done && new Date(dateStr+'T00:00:00') < today;
        html += `<div class="cal-dot ${overdue?'overdue':''}"></div>`;
      }
      if (dayTasks.length > 4) html += `<span class="cal-count">+${dayTasks.length-4}</span>`;
      html += '</div>';
    }
    html += '</div>';
  }

  // Next month padding
  const totalCells = firstDow + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 0; i < remaining; i++) {
    html += '<div class="cal-day other-month"></div>';
  }

  html += '</div>';
  html += '<div id="cal-day-tasks"></div>';
  main.innerHTML = html;
}

function calPrev() { calMonth--; if (calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if (calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

async function calDayClick(dateStr) {
  const res = await fetch(`${API}/api/tasks/due/calendar?start=${dateStr}&end=${dateStr}`);
  const data = await res.json();
  const tasks = data.tasks || [];
  const container = document.getElementById('cal-day-tasks');

  if (!tasks.length) {
    container.innerHTML = `<div class="empty" style="margin-top:12px">No tasks on ${dateStr}</div>`;
    return;
  }

  let html = `<div class="cal-day-tasks"><div class="section" style="margin-top:12px">`;
  for (const t of tasks) {
    html += `<div class="task ${t.done?'done':''}" onclick="openDetail(${t.id})">
      <input type="checkbox" ${t.done?'checked':''} onclick="event.stopPropagation();toggleTask(${t.id})">
      <span class="task-text">${escHtml(t.title)}
        <span class="upcoming-task-area">${escHtml(t.area_title)} / ${escHtml(t.section_name)}</span>
      </span>
    </div>`;
  }
  html += '</div></div>';
  container.innerHTML = html;
}

// ---- Utilities ----

function esc(s) { return s.replace(/['"]/g, ''); }
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function refreshTasks() {
  await fetchTasks();
  toast('Refreshed');
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? 'var(--danger)' : '#1e293b';
  el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); el.style.background = ''; }, 2500);
}

// ---- Init ----
fetchTasks();
</script>
