<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #efefef;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Nav ── */
    nav {
      background: #111;
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    nav .logo {
      color: #555;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-right: 24px;
      white-space: nowrap;
    }
    nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #777;
      cursor: pointer;
      font-size: 13px;
      padding: 13px 14px 11px;
      transition: color 0.15s;
    }
    nav button:hover { color: #ccc; }
    nav button.active { color: #fff; border-bottom-color: #fff; }
    nav button.today-tab { color: #f5b041; }
    nav button.today-tab:hover { color: #f8c471; }
    nav button.today-tab.active { color: #f8c471; border-bottom-color: #f5b041; }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 28px auto;
      padding: 0 20px 60px;
    }

    /* ── Section ── */
    .section { margin-bottom: 28px; }

    .section-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
      padding-bottom: 6px;
      margin-bottom: 4px;
      border-bottom: 1px solid #d8d8d8;
    }

    .subsection-heading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin: 14px 0 4px 0;
    }

    /* ── Task row ── */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 5px;
      transition: background 0.1s;
    }
    .task:hover { background: rgba(0,0,0,0.05); }
    .task.completed .task-text { text-decoration: line-through; color: #aaa; }
    .task.completed { opacity: 0.6; }

    /* Left: chevron + checkbox */
    .task-left {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .chevron {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 9px;
      padding: 0;
      width: 14px;
      text-align: center;
      line-height: 1;
      flex-shrink: 0;
    }
    .chevron.hidden { visibility: hidden; pointer-events: none; }
    input[type="checkbox"] {
      cursor: pointer;
      width: 14px;
      height: 14px;
      accent-color: #333;
      flex-shrink: 0;
    }

    /* Body: text + meta */
    .task-body { flex: 1; min-width: 0; }
    .task-text { word-break: break-word; }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 3px;
      align-items: center;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .badge-p1 { background: #fde0e0; color: #b91c1c; }
    .badge-p2 { background: #fef3cd; color: #92400e; }
    .badge-p3 { background: #ebebeb; color: #666; }
    .badge-delegated { background: #dbeafe; color: #1d4ed8; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .due {
      font-size: 11px;
      color: #999;
    }
    .due.overdue { color: #b91c1c; font-weight: 600; }

    /* Area tag (Today view only) */
    .task-area-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 6px;
      background: #e0e0e0;
      color: #666;
      letter-spacing: 0.04em;
      vertical-align: 2px;
    }
    .task-area-tag.sunbelt { background: #dbeafe; color: #1e40af; }
    .task-area-tag.app { background: #d1fae5; color: #047857; }
    .task-area-tag.marketing { background: #fce7f3; color: #be185d; }

    /* Right: highlight button */
    .task-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding-top: 1px;
    }
    .btn-hl {
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      opacity: 0.18;
      padding: 2px 4px;
      transition: opacity 0.12s, background 0.12s;
    }
    .btn-hl:hover { opacity: 0.55; }
    .btn-hl.on { opacity: 1; background: #fff7e0; border-color: #f0a030; }

    /* Subtasks */
    .subtasks { margin-left: 28px; }
    .subtasks.hidden { display: none; }

    /* Non-checkbox notes */
    .note {
      font-size: 12px;
      color: #aaa;
      margin-left: 28px;
      padding: 1px 0;
      line-height: 1.4;
    }

    /* ── Today view ── */
    .today-greeting {
      font-size: 17px;
      font-weight: 600;
      color: #222;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 2px solid #333;
    }
    .today-block { margin-bottom: 26px; }
    .today-block-overdue .section-heading { color: #b91c1c; border-bottom-color: #f5b7b1; }
    .today-block-priorities .section-heading { color: #b45309; border-bottom-color: #fbe9a7; }
    .today-block-completed .section-heading { color: #047857; border-bottom-color: #b7ebc6; }
    .today-block-delegated .section-heading { color: #1d4ed8; border-bottom-color: #c3d7f7; }
    .area-header {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #333;
      margin: 28px 0 8px 0;
      padding: 6px 0 4px 0;
      border-bottom: 2px solid #333;
    }

    /* Loading / error */
    .status { color: #999; padding: 40px 0; text-align: center; font-size: 13px; }

    /* Saving indicator */
    #saving {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #333;
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #saving.visible { opacity: 1; }

    /* Nav anchors (area scroll shortcuts, not full tabs) */
    nav .nav-anchor {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #4a4a4a;
      cursor: pointer;
      font-size: 12px;
      padding: 13px 11px 11px;
      transition: color 0.15s;
    }
    nav .nav-anchor:hover { color: #999; }
    nav .nav-sep { color: #333; font-size: 11px; padding: 0 4px; user-select: none; line-height: 42px; }

    /* Notes tab */
    nav button.notes-tab { color: #7c9fcf; }
    nav button.notes-tab:hover { color: #a8c4e8; }
    nav button.notes-tab.active { color: #a8c4e8; border-bottom-color: #7c9fcf; }

    /* Notes view */
    .notes-search-wrap { margin-bottom: 24px; }
    .notes-search-input {
      width: 100%;
      max-width: 420px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      background: #fff;
      color: #1a1a1a;
    }
    .notes-search-input:focus { border-color: #888; }
    .note-area-block { margin-bottom: 32px; }
    .note-area-block-header {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #333;
      margin: 0 0 12px 0;
      padding: 6px 0 4px 0;
      border-bottom: 2px solid #333;
    }
    .note-section-el { margin-bottom: 18px; }
    .note-sec-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
      padding-bottom: 6px;
      margin-bottom: 8px;
      border-bottom: 1px solid #d8d8d8;
    }
    .note-subsec-heading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin: 14px 0 6px 0;
    }
    .note-para { font-size: 13px; color: #333; margin: 5px 0; line-height: 1.6; }
    .note-ul { margin: 5px 0 5px 18px; padding: 0; }
    .note-ul li { font-size: 13px; color: #444; line-height: 1.6; margin: 2px 0; }
    .note-ul li strong { color: #222; }
    .note-code { font-family: 'Menlo', 'Consolas', monospace; background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .notes-no-results { color: #aaa; font-style: italic; font-size: 13px; padding: 24px 0; text-align: center; }
  </style>
</head>
<body>

<nav>
  <span class="logo">Work Planner</span>
  <div id="tabs"></div>
</nav>

<main id="content">
  <div class="status">Loading...</div>
</main>

<div id="saving">Saving…</div>

<script>
const AREA_LABELS = { sunbelt: 'Sunbelt', app: 'App', marketing: 'Marketing', personal: 'Personal' };
const TODAY_AREAS = ['sunbelt', 'app', 'marketing']; // default areas in Today view

let areas = {};           // from /api/areas
let areaStates = {};      // { area: { rawLines: [...] } }
let currentView = null;   // 'today' | 'today:<area>' | '<area>'

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('/api/areas');
    const list = await res.json();
    areas = {};
    for (const a of list) areas[a.key] = a;
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="status">Could not connect to server. Is server.py running?</div>';
    return;
  }
  buildTabs();
  window.addEventListener('hashchange', applyHash);

  // Initial route from URL hash
  const hash = location.hash;
  if (hash === '#notes') { switchToNotes(); return; }
  if (hash.startsWith('#today/')) {
    const scrollTo = hash.slice('#today/'.length);
    switchToToday(TODAY_AREAS.includes(scrollTo) ? scrollTo : null);
    return;
  }
  if (hash === '#today') { switchToToday(null); return; }
  switchToToday(null);
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';

  // Today tab
  const todayBtn = document.createElement('button');
  todayBtn.textContent = 'Today';
  todayBtn.className = 'today-tab';
  todayBtn.dataset.view = 'today';
  todayBtn.onclick = () => {
    if (currentView === 'today') {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      switchToToday(null);
    }
  };
  tabs.appendChild(todayBtn);

  // Area anchor buttons — scroll to sections in Today view
  for (const key of TODAY_AREAS) {
    const btn = document.createElement('button');
    btn.textContent = AREA_LABELS[key] || key;
    btn.className = 'nav-anchor';
    btn.dataset.anchor = key;
    btn.onclick = () => navigateToArea(key);
    tabs.appendChild(btn);
  }

  // Separator
  const sep = document.createElement('span');
  sep.className = 'nav-sep';
  sep.textContent = '|';
  tabs.appendChild(sep);

  // Notes tab
  const notesBtn = document.createElement('button');
  notesBtn.textContent = 'Notes';
  notesBtn.className = 'notes-tab';
  notesBtn.dataset.view = 'notes';
  notesBtn.onclick = () => switchToNotes();
  tabs.appendChild(notesBtn);
}

function setActiveTab(view) {
  document.querySelectorAll('#tabs button[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
}

function applyHash() {
  const hash = location.hash;
  if (hash === '#notes') {
    if (currentView !== 'notes') switchToNotes();
  } else if (hash.startsWith('#today/')) {
    const scrollTo = hash.slice('#today/'.length);
    if (currentView !== 'today') {
      switchToToday(scrollTo);
    } else {
      const el = document.getElementById(`area-section-${scrollTo}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  } else if (hash === '#today') {
    if (currentView !== 'today') switchToToday(null);
  }
}

// ── Data fetching ────────────────────────────────────────────────────────────

async function fetchArea(area) {
  const res = await fetch(`/api/tasks/${area}`);
  const text = await res.text();
  areaStates[area] = { rawLines: text.split('\n').map(l => l.replace(/\r$/, '')) };
}

async function switchArea(area) {
  currentView = area;
  setActiveTab(area);
  document.getElementById('content').innerHTML = '<div class="status">Loading...</div>';
  if (location.hash) history.replaceState(null, '', location.pathname + location.search);
  try {
    await fetchArea(area);
    renderArea(area);
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Failed to load tasks.</div>';
  }
}

async function switchToToday(scrollTo) {
  currentView = 'today';
  setActiveTab('today');
  document.getElementById('content').innerHTML = '<div class="status">Loading...</div>';
  const newHash = scrollTo ? `#today/${scrollTo}` : '#today';
  if (location.hash !== newHash) history.replaceState(null, '', location.pathname + location.search + newHash);
  try {
    await Promise.all(TODAY_AREAS.map(fetchArea));
    renderToday();
    if (scrollTo) {
      setTimeout(() => {
        const el = document.getElementById(`area-section-${scrollTo}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Failed to load tasks.</div>';
  }
}

async function navigateToArea(area) {
  if (currentView !== 'today') {
    await switchToToday(area);
  } else {
    const el = document.getElementById(`area-section-${area}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── Markdown parsing ─────────────────────────────────────────────────────────

function parseLine(line) {
  // Task line: optional indent, - [ ] or - [x], then content
  const taskMatch = line.match(/^(\s*)- \[([ x])\] (.*)$/);
  if (taskMatch) {
    const indent = taskMatch[1].length;
    const checked = taskMatch[2] === 'x';
    let rest = taskMatch[3];

    const highlighted = rest.startsWith('🟠 ');
    if (highlighted) rest = rest.slice('🟠 '.length);

    const priMatch = rest.match(/\[(P[123])\]/);
    const priority = priMatch ? priMatch[1] : null;
    if (priMatch) rest = rest.replace(/\s*\[P[123]\]\s*/, ' ').trim();

    const dueMatch = rest.match(/\(due:\s*(\d{4}-\d{2}-\d{2})\)/);
    const due = dueMatch ? dueMatch[1] : null;
    if (dueMatch) rest = rest.replace(/\s*\(due:\s*\d{4}-\d{2}-\d{2}\)\s*/, ' ').trim();

    const delMatch = rest.match(/@delegated\(([^)]+)\)/);
    const delegated = delMatch ? delMatch[1] : null;
    if (delMatch) rest = rest.replace(/\s*@delegated\([^)]+\)\s*/, ' ').trim();

    return { type: 'task', indent, checked, highlighted, priority, due, delegated, text: rest.trim() };
  }

  const headMatch = line.match(/^(#{1,3}) (.+)$/);
  if (headMatch) {
    return { type: 'section', level: headMatch[1].length, text: headMatch[2].trim() };
  }

  if (line.match(/^\s+- /)) {
    const text = line.replace(/^\s+- /, '').replace(/\\(.)/g, '$1');
    return { type: 'note', text };
  }

  return { type: 'blank' };
}

function isOverdue(due) {
  if (!due) return false;
  const today = new Date().toISOString().slice(0, 10);
  return due < today;
}

// Parse an area into a structured list of sections + top-level tasks (with subtasks & notes)
function parseArea(area) {
  const lines = areaStates[area].rawLines;
  const sections = []; // [{ name, tasks: [...] }]
  let currentSection = null;
  let currentTask = null;

  lines.forEach((line, idx) => {
    const p = parseLine(line);
    if (p.type === 'section' && p.level === 2) {
      currentSection = { name: p.text, tasks: [] };
      sections.push(currentSection);
      currentTask = null;
      return;
    }
    if (p.type === 'task') {
      const obj = { ...p, lineIdx: idx, area, subtasks: [], notes: [] };
      if (p.indent === 0) {
        currentTask = obj;
        if (currentSection) currentSection.tasks.push(currentTask);
      } else if (currentTask) {
        currentTask.subtasks.push(obj);
      }
      return;
    }
    if (p.type === 'note' && currentTask) {
      currentTask.notes.push(p.text);
    }
  });

  return sections;
}

// ── Render: area view (unchanged layout, linear pass over rawLines) ─────────

function renderArea(area) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const lines = areaStates[area].rawLines;

  let sectionEl = null;
  let topGroup = null;
  let topTaskEl = null;
  let subtasksEl = null;

  lines.forEach((line, idx) => {
    const p = parseLine(line);

    if (p.type === 'section') {
      if (p.level === 1) return;
      if (p.level === 2) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'section';
        const h = document.createElement('div');
        h.className = 'section-heading';
        h.textContent = p.text;
        sectionEl.appendChild(h);
        content.appendChild(sectionEl);
        topGroup = null; topTaskEl = null; subtasksEl = null;
      } else {
        const h = document.createElement('div');
        h.className = 'subsection-heading';
        h.textContent = p.text;
        (sectionEl || content).appendChild(h);
        topGroup = null; topTaskEl = null; subtasksEl = null;
      }
      return;
    }

    if (p.type === 'task') {
      const el = buildTaskEl(p, idx, area, false);
      if (p.indent === 0) {
        const group = document.createElement('div');
        group.appendChild(el);
        (sectionEl || content).appendChild(group);
        topGroup = group;
        topTaskEl = el;
        subtasksEl = null;
      } else {
        if (topGroup) {
          if (!subtasksEl) {
            subtasksEl = document.createElement('div');
            subtasksEl.className = 'subtasks hidden';
            topGroup.appendChild(subtasksEl);
            const thisSubtasks = subtasksEl;
            const chev = topTaskEl.querySelector('.chevron');
            if (chev) {
              chev.classList.remove('hidden');
              chev.textContent = '▶';
              chev.onclick = () => {
                const nowHidden = thisSubtasks.classList.toggle('hidden');
                chev.textContent = nowHidden ? '▶' : '▼';
              };
            }
          }
          subtasksEl.appendChild(el);
        }
      }
      return;
    }

    if (p.type === 'note') {
      if (topGroup) {
        const note = document.createElement('div');
        note.className = 'note';
        note.textContent = p.text;
        (subtasksEl || topGroup).appendChild(note);
      }
      return;
    }
  });
}

// ── Render: Today view ──────────────────────────────────────────────────────

function renderToday() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const parsed = {};
  for (const a of TODAY_AREAS) parsed[a] = parseArea(a);

  // Greeting
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  const greeting = document.createElement('div');
  greeting.className = 'today-greeting';
  greeting.id = 'today-top';
  greeting.textContent = 'Good morning — ' + dateStr;
  content.appendChild(greeting);

  // Flatten all top-level tasks across all areas
  const allTasks = [];
  for (const a of TODAY_AREAS) {
    for (const sec of parsed[a]) {
      for (const t of sec.tasks) allTasks.push(t);
    }
  }

  // Helper: build a titled block with a set of task groups
  function buildBlock(title, tasks, blockClass, showTags) {
    if (!tasks.length) return null;
    const block = document.createElement('div');
    block.className = 'today-block' + (blockClass ? ' ' + blockClass : '');
    const h = document.createElement('div');
    h.className = 'section-heading';
    h.textContent = title;
    block.appendChild(h);
    for (const t of tasks) block.appendChild(buildTaskGroup(t, showTags));
    return block;
  }

  // Overdue
  const overdue = allTasks.filter(t => !t.checked && isOverdue(t.due));
  const overdueBlock = buildBlock(`Overdue (${overdue.length})`, overdue, 'today-block-overdue', true);
  if (overdueBlock) content.appendChild(overdueBlock);

  // Priorities — P1 or highlighted
  const priorities = allTasks.filter(t =>
    !t.checked && (t.priority === 'P1' || t.highlighted)
  );
  priorities.sort((a, b) => {
    if (a.priority === 'P1' && b.priority !== 'P1') return -1;
    if (b.priority === 'P1' && a.priority !== 'P1') return 1;
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return 0;
  });
  const prioritiesBlock = buildBlock(`Priorities (${priorities.length})`, priorities, 'today-block-priorities', true);
  if (prioritiesBlock) content.appendChild(prioritiesBlock);

  // Open by area — each area gets a scroll-anchor header, then one block per section
  for (const a of TODAY_AREAS) {
    const openInArea = [];
    for (const sec of parsed[a]) openInArea.push(...sec.tasks.filter(t => !t.checked));
    if (!openInArea.length) continue;

    const areaHeader = document.createElement('div');
    areaHeader.className = 'area-header';
    areaHeader.id = `area-section-${a}`;
    areaHeader.textContent = `${AREA_LABELS[a]} — ${openInArea.length} open`;
    content.appendChild(areaHeader);

    for (const sec of parsed[a]) {
      const openInSection = sec.tasks.filter(t => !t.checked);
      if (!openInSection.length) continue;
      const block = buildBlock(`${sec.name} (${openInSection.length})`, openInSection, null, false);
      if (block) content.appendChild(block);
    }
  }

  // Delegated — Irina
  const delegated = allTasks.filter(t => !t.checked && t.delegated === 'Irina');
  const delegatedBlock = buildBlock(`Delegated — Irina (${delegated.length})`, delegated, 'today-block-delegated', true);
  if (delegatedBlock) content.appendChild(delegatedBlock);

  // Completed (pending archive)
  const completed = allTasks.filter(t => t.checked);
  const completedBlock = buildBlock(`Completed (${completed.length})`, completed, 'today-block-completed', true);
  if (completedBlock) content.appendChild(completedBlock);
}

// Build a task row + its subtasks (collapsible) and notes
function buildTaskGroup(task, showAreaTag) {
  const group = document.createElement('div');
  const el = buildTaskEl(task, task.lineIdx, task.area, showAreaTag);
  group.appendChild(el);

  const hasSubtasks = task.subtasks && task.subtasks.length > 0;

  if (hasSubtasks) {
    const subtasksEl = document.createElement('div');
    subtasksEl.className = 'subtasks hidden';
    group.appendChild(subtasksEl);

    const chev = el.querySelector('.chevron');
    if (chev) {
      chev.classList.remove('hidden');
      chev.textContent = '▶';
      chev.onclick = () => {
        const nowHidden = subtasksEl.classList.toggle('hidden');
        chev.textContent = nowHidden ? '▶' : '▼';
      };
    }

    for (const sub of task.subtasks) {
      subtasksEl.appendChild(buildTaskEl(sub, sub.lineIdx, sub.area, false));
    }
    for (const note of task.notes) {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = note;
      subtasksEl.appendChild(n);
    }
  } else if (task.notes && task.notes.length) {
    for (const note of task.notes) {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = note;
      group.appendChild(n);
    }
  }

  return group;
}

// ── Task row builder ────────────────────────────────────────────────────────

function buildTaskEl(p, lineIdx, area, showAreaTag) {
  const wrap = document.createElement('div');
  wrap.className = 'task' + (p.checked ? ' completed' : '');
  wrap.dataset.area = area;
  wrap.dataset.lineIdx = lineIdx;

  // Left: chevron + checkbox
  const left = document.createElement('div');
  left.className = 'task-left';

  const chev = document.createElement('button');
  chev.className = 'chevron hidden';
  chev.textContent = '▶';
  left.appendChild(chev);

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = p.checked;
  cb.onchange = () => toggleCheckbox(area, lineIdx);
  left.appendChild(cb);
  wrap.appendChild(left);

  // Body: text + meta
  const body = document.createElement('div');
  body.className = 'task-body';

  const textLine = document.createElement('div');
  textLine.className = 'task-text';

  if (showAreaTag) {
    const tag = document.createElement('span');
    tag.className = 'task-area-tag ' + area;
    tag.textContent = AREA_LABELS[area] || area;
    textLine.appendChild(tag);
  }

  const textSpan = document.createElement('span');
  textSpan.textContent = p.text;
  textLine.appendChild(textSpan);
  body.appendChild(textLine);

  if (p.priority || p.due || p.delegated) {
    const meta = document.createElement('div');
    meta.className = 'task-meta';
    if (p.priority) {
      const b = document.createElement('span');
      b.className = `badge badge-${p.priority.toLowerCase()}`;
      b.textContent = p.priority;
      meta.appendChild(b);
    }
    if (p.due) {
      const d = document.createElement('span');
      const overdue = isOverdue(p.due);
      d.className = 'due' + (overdue ? ' overdue' : '');
      d.textContent = (overdue ? '⚠ ' : '') + 'due ' + p.due;
      meta.appendChild(d);
    }
    if (p.delegated) {
      const d = document.createElement('span');
      d.className = 'badge badge-delegated';
      d.textContent = '@' + p.delegated;
      meta.appendChild(d);
    }
    body.appendChild(meta);
  }

  wrap.appendChild(body);

  // Right: highlight button
  const right = document.createElement('div');
  right.className = 'task-right';
  const hl = document.createElement('button');
  hl.className = 'btn-hl' + (p.highlighted ? ' on' : '');
  hl.title = p.highlighted ? 'Remove highlight' : 'Highlight';
  hl.textContent = '🟠';
  hl.onclick = () => toggleHighlight(area, lineIdx);
  right.appendChild(hl);
  wrap.appendChild(right);

  return wrap;
}

// ── Mutations ────────────────────────────────────────────────────────────────

function toggleCheckbox(area, lineIdx) {
  const rawLines = areaStates[area].rawLines;
  const line = rawLines[lineIdx];
  if (/^(\s*)- \[ \]/.test(line)) {
    rawLines[lineIdx] = line.replace(/^(\s*)- \[ \]/, '$1- [x]');
  } else {
    rawLines[lineIdx] = line.replace(/^(\s*)- \[x\]/, '$1- [ ]');
  }
  save(area);
}

function toggleHighlight(area, lineIdx) {
  const rawLines = areaStates[area].rawLines;
  const line = rawLines[lineIdx];
  const withHL = line.match(/^(\s*- \[[ x]\] )🟠 (.*)$/);
  if (withHL) {
    rawLines[lineIdx] = withHL[1] + withHL[2];
  } else {
    const without = line.match(/^(\s*- \[[ x]\] )(.*)$/);
    if (without) rawLines[lineIdx] = without[1] + '🟠 ' + without[2];
  }
  save(area);
}

let saveTimer = null;
const saveQueue = new Set();

function save(area) {
  rerenderCurrent();
  saveQueue.add(area);
  const indicator = document.getElementById('saving');
  indicator.classList.add('visible');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const toSave = [...saveQueue];
    saveQueue.clear();
    try {
      await Promise.all(toSave.map(async a => {
        const body = areaStates[a].rawLines.join('\n');
        await fetch(`/api/tasks/${a}`, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain; charset=utf-8' },
          body,
        });
      }));
    } catch (e) {
      console.error('Save failed', e);
    }
    indicator.classList.remove('visible');
  }, 400);
}

// ── Notes view ───────────────────────────────────────────────────────────────

const NOTES_AREAS_ALL = ['sunbelt', 'app', 'marketing', 'personal'];
let notesData = {};

async function switchToNotes() {
  currentView = 'notes';
  setActiveTab('notes');
  document.getElementById('content').innerHTML = '<div class="status">Loading...</div>';
  if (location.hash !== '#notes') history.replaceState(null, '', location.pathname + location.search + '#notes');
  try {
    await Promise.all(NOTES_AREAS_ALL.map(async a => {
      const res = await fetch(`/api/notes/${a}`);
      notesData[a] = await res.text();
    }));
    renderNotes('');
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="status">Failed to load notes.</div>';
  }
}

function renderNotes(query) {
  const content = document.getElementById('content');

  // Build or reuse search bar
  let searchInput = document.getElementById('notes-search');
  if (!searchInput) {
    content.innerHTML = '';
    const searchWrap = document.createElement('div');
    searchWrap.className = 'notes-search-wrap';
    searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.id = 'notes-search';
    searchInput.placeholder = 'Search notes…';
    searchInput.className = 'notes-search-input';
    searchInput.addEventListener('input', () => renderNotes(searchInput.value));
    searchWrap.appendChild(searchInput);
    content.appendChild(searchWrap);

    const notesContainer = document.createElement('div');
    notesContainer.id = 'notes-content';
    content.appendChild(notesContainer);
  }

  searchInput.value = query;

  const notesContainer = document.getElementById('notes-content');
  notesContainer.innerHTML = '';

  const q = query.trim().toLowerCase();
  let totalMatches = 0;

  for (const a of NOTES_AREAS_ALL) {
    const text = notesData[a] || '';
    const sections = parseNoteFile(text);
    const matching = q
      ? sections.filter(s => (s.heading + '\n' + s.lines.join('\n')).toLowerCase().includes(q))
      : sections;
    if (!matching.length) continue;
    totalMatches += matching.length;

    const areaBlock = document.createElement('div');
    areaBlock.className = 'note-area-block';

    const areaHdr = document.createElement('div');
    areaHdr.className = 'note-area-block-header';
    areaHdr.textContent = AREA_LABELS[a] || a;
    areaBlock.appendChild(areaHdr);

    for (const sec of matching) areaBlock.appendChild(renderNoteSectionEl(sec));
    notesContainer.appendChild(areaBlock);
  }

  if (q && totalMatches === 0) {
    const empty = document.createElement('div');
    empty.className = 'notes-no-results';
    empty.textContent = `No notes match "${query}"`;
    notesContainer.appendChild(empty);
  }
}

function parseNoteFile(text) {
  const lines = text.split('\n');
  const sections = [];
  let current = null;

  for (const line of lines) {
    const t = line.trimEnd();
    if (t.startsWith('### ')) {
      if (current) sections.push(current);
      current = { level: 3, heading: t.slice(4).trim(), lines: [] };
    } else if (t.startsWith('## ')) {
      if (current) sections.push(current);
      current = { level: 2, heading: t.slice(3).trim(), lines: [] };
    } else if (t.startsWith('# ')) {
      // skip document title
    } else if (current) {
      current.lines.push(t);
    }
  }
  if (current) sections.push(current);

  for (const s of sections) {
    while (s.lines.length && !s.lines[s.lines.length - 1].trim()) s.lines.pop();
  }
  return sections.filter(s => s.lines.some(l => l.trim()));
}

function renderNoteSectionEl(sec) {
  const el = document.createElement('div');
  el.className = 'note-section-el';

  const hdr = document.createElement('div');
  hdr.className = sec.level === 2 ? 'note-sec-heading' : 'note-subsec-heading';
  hdr.textContent = sec.heading;
  el.appendChild(hdr);

  let ulEl = null;
  for (const line of sec.lines) {
    if (!line.trim()) { ulEl = null; continue; }
    if (/^(\s*)[-*] /.test(line)) {
      if (!ulEl) { ulEl = document.createElement('ul'); ulEl.className = 'note-ul'; el.appendChild(ulEl); }
      const li = document.createElement('li');
      li.innerHTML = renderInlineMarkdown(line.replace(/^(\s*)[-*] /, ''));
      ulEl.appendChild(li);
    } else {
      ulEl = null;
      const p = document.createElement('p');
      p.className = 'note-para';
      p.innerHTML = renderInlineMarkdown(line);
      el.appendChild(p);
    }
  }
  return el;
}

function renderInlineMarkdown(text) {
  const safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return safe
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<span class="note-code">$1</span>')
    .replace(/~~(.+?)~~/g, '<s>$1</s>');
}

// Re-render whatever view the user is currently looking at, preserving scroll
function rerenderCurrent() {
  const scrollY = window.scrollY;
  if (currentView === 'today') {
    renderToday();
  } else if (currentView === 'notes') {
    // notes view handles its own scroll via the stable search bar
  } else if (currentView) {
    renderArea(currentView);
  }
  window.scrollTo(0, scrollY);
}

// ── Go ───────────────────────────────────────────────────────────────────────
init();
